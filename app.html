      if (level === "easy") {
        const factories = [
          () => ({
            q: withDisplayMath(`\\text{Write Coulomb's law for the magnitude of the force between two point charges.}`),
            s: withDisplayMath(`F=k\\frac{|q_1q_2|}{r^2}`),
            tag: "Coulomb law"
          }),
          () => {
            const q = randInt(1, 8);
            const E = randInt(80, 500);
            return {
              q: withDisplayMath(`\\text{A charge }q=${q}\\,\\mu\\mathrm{C}\\text{ is placed in a uniform electric field }E=${E}\\,\\mathrm{N/C}.\\ \\text{Find the force magnitude.}`),
              s: withDisplayMath(`F=qE=${q}\\times10^{-6}\\cdot${E}=${(q * 1e-6 * E).toExponential(2)}\\,\\mathrm{N}`),
              tag: "Electric force"
            };
          },
          () => {
            const q = randInt(1, 9);
            const r = randInt(1, 5) / 10;
            return {
              q: withDisplayMath(`\\text{A point charge }q=${q}\\,\\mu\\mathrm{C}\\text{ is at distance }r=${r}\\,\\mathrm{m}.\\ \\text{Find the electric-field magnitude at that point.}`),
              s: withDisplayMath(`E=k\\frac{|q|}{r^2}=8.99\\times10^9\\frac{${q}\\times10^{-6}}{${r}^2}=${(k * q * 1e-6 / (r * r)).toExponential(2)}\\,\\mathrm{N/C}`),
              tag: "Point charge field"
            };
          },
          () => {
            const E = randInt(50, 300);
            const A = randInt(2, 8) / 10;
            return {
              q: withDisplayMath(`\\text{A uniform electric field }E=${E}\\,\\mathrm{N/C}\\text{ crosses a flat surface of area }A=${A}\\,\\mathrm{m^2}\\text{ perpendicular to the field. Find the flux.}`),
              s: withDisplayMath(`\\Phi_E=EA=${E}\\cdot${A}=${dec(E * A)}\\,\\mathrm{N\\,m^2/C}`),
              tag: "Electric flux"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{State Gauss's law in integral form.}`),
            s: withDisplayMath(`\\oint \\vec E\\cdot d\\vec A=\\frac{Q_{int}}{\\varepsilon_0}`),
            tag: "Gauss law"
          }),
          () => ({
            q: withDisplayMath(`\\text{What is the electric field inside a conductor in electrostatic equilibrium?}`),
            s: withDisplayMath(`\\vec E=0`),
            tag: "Conductors"
          }),
          () => ({
            q: withDisplayMath(`\\text{Two equal positive point charges are placed symmetrically about a midpoint. What is the electric field at the midpoint?}`),
            s: withDisplayMath(`\\vec E=0`),
            tag: "Symmetry"
          }),
          () => ({
            q: withDisplayMath(`\\text{Write the electric-field magnitude of an infinite plane sheet with surface charge density }\\sigma.`),
            s: withDisplayMath(`E=\\frac{\\sigma}{2\\varepsilon_0}`),
            tag: "Plane sheet"
          })
        ];
        return buildPool(() => choice(factories)(), 150);
      }

      if (level === "hard") {
        const factories = [
          () => ({
            q: withDisplayMath(`\\text{A point charge }Q\\text{ is placed at the center of a cube. What is the electric flux through one face?}`),
            s: withDisplayMath(`\\Phi_{face}=\\frac{Q}{6\\varepsilon_0}`),
            tag: "Symmetry flux"
          }),
          () => ({
            q: withDisplayMath(`\\text{Write the electric field just outside the surface of a conductor with surface charge density }\\sigma.`),
            s: withDisplayMath(`E=\\frac{\\sigma}{\\varepsilon_0}`),
            tag: "Conducting surface"
          }),
          () => ({
            q: withDisplayMath(`\\text{Write the electric-field magnitude on the axis of a uniformly charged ring of radius }R\\text{ and charge }Q\\text{ at distance }x\\text{ from the center.}`),
            s: withDisplayMath(`E=\\frac{1}{4\\pi\\varepsilon_0}\\frac{Qx}{(x^2+R^2)^{3/2}}`),
            tag: "Charged ring"
          }),
          () => ({
            q: withDisplayMath(`\\text{Write the far-field electric field on the axis of an electric dipole of moment }p.}`),
            s: withDisplayMath(`E\\approx\\frac{1}{4\\pi\\varepsilon_0}\\frac{2p}{r^3}`),
            tag: "Dipole field"
          }),
          () => ({
            q: withDisplayMath(`\\text{Using Gauss's law, write the electric field at distance }r\\text{ from an infinite line charge of density }\\lambda.`),
            s: withDisplayMath(`E=\\frac{\\lambda}{2\\pi\\varepsilon_0 r}`),
            tag: "Line charge"
          }),
          () => ({
            q: withDisplayMath(`\\text{If a closed surface encloses zero net charge, what is the total electric flux through it?}`),
            s: withDisplayMath(`\\Phi_E=0`),
            tag: "Gauss law"
          }),
          () => {
            const E = randInt(200, 900);
            return {
              q: withDisplayMath(`\\text{The electric field just outside a conductor is }E=${E}\\,\\mathrm{N/C}.\\ \\text{Find the surface charge density.}`),
              s: withDisplayMath(`\\sigma=\\varepsilon_0E=${E}\\varepsilon_0\\,\\mathrm{C/m^2}`),
              tag: "Surface charge density"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{Write the electric field inside a uniformly charged solid sphere of radius }R\\text{ and total charge }Q\\text{ at distance }r<R\\text{ from the center.}`),
            s: withDisplayMath(`E(r)=\\frac{1}{4\\pi\\varepsilon_0}\\frac{Qr}{R^3}`),
            tag: "Charged sphere"
          })
        ];
        return buildPool(() => choice(factories)(), 170);
      }

      const factories = [
        () => {
          const Q = randInt(1, 9);
          return {
            q: withDisplayMath(`\\text{A closed surface encloses charge }Q=${Q}\\,\\mu\\mathrm{C}.\\ \\text{Write the total electric flux through the surface.}`),
            s: withDisplayMath(`\\Phi_E=\\frac{Q}{\\varepsilon_0}=\\frac{${Q}\\times10^{-6}}{\\varepsilon_0}`),
            tag: "Gauss flux"
          };
        },
        () => ({
          q: withDisplayMath(`\\text{Write the electric field outside a uniformly charged spherical shell of total charge }Q\\text{.}`),
          s: withDisplayMath(`E=\\frac{1}{4\\pi\\varepsilon_0}\\frac{Q}{r^2}`),
          tag: "Spherical shell"
        }),
        () => ({
          q: withDisplayMath(`\\text{What is the electric field inside a uniformly charged spherical shell?}`),
          s: withDisplayMath(`E=0`),
          tag: "Spherical shell"
        }),
        () => ({
          q: withDisplayMath(`\\text{Write the electric field magnitude at distance }r\\text{ from an infinite line charge of density }\\lambda.`),
          s: withDisplayMath(`E=\\frac{\\lambda}{2\\pi\\varepsilon_0 r}`),
          tag: "Line charge"
        }),
        () => {
          const q1 = randInt(1, 6);
          const q2 = randInt(1, 6);
          const r = randInt(1, 8) / 10;
          return {
            q: withDisplayMath(`\\text{Two point charges }q_1=${q1}\\,\\mu\\mathrm{C}\\text{ and }q_2=${q2}\\,\\mu\\mathrm{C}\\text{ are separated by }r=${r}\\,\\mathrm{m}.\\ \\text{Find the force magnitude.}`),
            s: withDisplayMath(`F=k\\frac{|q_1q_2|}{r^2}=8.99\\times10^9\\frac{${q1}\\times10^{-6}\\cdot${q2}\\times10^{-6}}{${r}^2}=${(k * q1 * q2 * 1e-12 / (r * r)).toExponential(2)}\\,\\mathrm{N}`),
            tag: "Coulomb law"
          };
        },
        () => {
          const q = randInt(1, 8);
          const d = randInt(1, 8) / 10;
          return {
            q: withDisplayMath(`\\text{A dipole is made of charges }\\pm ${q}\\,\\mu\\mathrm{C}\\text{ separated by }d=${d}\\,\\mathrm{m}.\\ \\text{Find the dipole moment magnitude.}`),
            s: withDisplayMath(`p=qd=${q}\\times10^{-6}\\cdot${d}=${(q * 1e-6 * d).toExponential(2)}\\,\\mathrm{C\\,m}`),
            tag: "Dipole moment"
          };
        },
        () => ({
          q: withDisplayMath(`\\text{Two large oppositely charged parallel plates have surface charge density }\\sigma.\\ \\text{Write the electric field between them.}`),
          s: withDisplayMath(`E=\\frac{\\sigma}{\\varepsilon_0}`),
          tag: "Parallel plates"
        }),
        () => ({
          q: withDisplayMath(`\\text{Write the electric field inside a uniformly charged solid sphere of radius }R\\text{ at distance }r<R\\text{ from the center.}`),
          s: withDisplayMath(`E(r)=\\frac{1}{4\\pi\\varepsilon_0}\\frac{Qr}{R^3}`),
          tag: "Charged sphere"
        })
      ];
      return buildPool(() => choice(factories)(), 160);
    }

    function potentialTemplates(level = "medium") {
      if (level === "easy") {
        const factories = [
          () => ({
            q: withDisplayMath(`\\text{Write the electric potential of a point charge }q\\text{ at distance }r.`),
            s: withDisplayMath(`V=k\\frac{q}{r}`),
            tag: "Point-charge potential"
          }),
          () => {
            const C = randInt(1, 8);
            const V = randInt(5, 80);
            return {
              q: withDisplayMath(`\\text{A capacitor has }C=${C}\\,\\mu\\mathrm{F}\\text{ and }V=${V}\\,\\mathrm{V}.\\ \\text{Find the stored charge.}`),
              s: withDisplayMath(`Q=CV=${C}\\times10^{-6}\\cdot${V}=${(C * 1e-6 * V).toExponential(2)}\\,\\mathrm{C}`),
              tag: "Capacitance"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{Write the energy stored in a capacitor in terms of }C\\text{ and }V.`),
            s: withDisplayMath(`U=\\frac12 CV^2`),
            tag: "Capacitor energy"
          }),
          () => ({
            q: withDisplayMath(`\\text{State the relation between electric field and potential difference in a uniform field.}`),
            s: withDisplayMath(`\\Delta V=-Ed`),
            tag: "Potential difference"
          }),
          () => ({
            q: withDisplayMath(`\\text{What is the equivalent capacitance of two capacitors in parallel?}`),
            s: withDisplayMath(`C_{eq}=C_1+C_2`),
            tag: "Parallel capacitors"
          }),
          () => ({
            q: withDisplayMath(`\\text{What is the equivalent capacitance of two capacitors in series?}`),
            s: withDisplayMath(`\\frac{1}{C_{eq}}=\\frac{1}{C_1}+\\frac{1}{C_2}`),
            tag: "Series capacitors"
          }),
          () => {
            const q = randInt(1, 8);
            const V = randInt(5, 60);
            return {
              q: withDisplayMath(`\\text{A charge }q=${q}\\,\\mu\\mathrm{C}\\text{ is at potential }V=${V}\\,\\mathrm{V}.\\ \\text{Find its electric potential energy.}`),
              s: withDisplayMath(`U=qV=${q}\\times10^{-6}\\cdot${V}=${(q * 1e-6 * V).toExponential(2)}\\,\\mathrm{J}`),
              tag: "Potential energy"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{What is an equipotential surface?}`),
            s: withDisplayMath(`\\text{A surface on which the electric potential is constant.}`),
            tag: "Equipotentials"
          })
        ];
        return buildPool(() => choice(factories)(), 150);
      }

      if (level === "hard") {
        const factories = [
          () => {
            const V = randInt(10, 100);
            return {
              q: withDisplayMath(`\\text{A parallel-plate capacitor remains connected to a battery of voltage }V=${V}\\,\\mathrm{V}.\\ \\text{If the plate distance doubles, how do }C,Q,\\text{ and }U\\text{ change?}`),
              s: withDisplayMath(`C'\\!=\\!\\frac{C}{2},\\quad Q'\\!=\\!\\frac{Q}{2},\\quad U'\\!=\\!\\frac{U}{2}`),
              tag: "Battery-connected capacitor"
            };
          },
          () => {
            const kappa = choice([2, 3, 4, 5]);
            return {
              q: withDisplayMath(`\\text{An isolated capacitor is disconnected from the battery and then filled with a dielectric of relative permittivity }\\kappa=${kappa}.\\ \\text{How does the potential difference change?}`),
              s: withDisplayMath(`V'\\!=\\!\\frac{V}{\\kappa}=\\frac{V}{${kappa}}`),
              tag: "Dielectrics"
            };
          },
          () => {
            const C1 = randInt(1, 8);
            const C2 = randInt(1, 8);
            const C3 = randInt(1, 8);
            const ceq = 1 / (1 / C1 + 1 / C2 + 1 / C3);
            return {
              q: withDisplayMath(`\\text{Three capacitors }${C1},\\ ${C2},\\ ${C3}\\,\\mu\\mathrm{F}\\text{ are connected in series. Find }C_{eq}.`),
              s: withDisplayMath(`\\frac{1}{C_{eq}}=\\frac{1}{${C1}}+\\frac{1}{${C2}}+\\frac{1}{${C3}}\\Rightarrow C_{eq}=${dec(ceq)}\\,\\mu\\mathrm{F}`),
              tag: "Series capacitors"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{Write the electrostatic energy density in vacuum in terms of }E.`),
            s: withDisplayMath(`u=\\frac12\\varepsilon_0E^2`),
            tag: "Energy density"
          }),
          () => {
            const Q = randInt(1, 8);
            const C = randInt(1, 8);
            return {
              q: withDisplayMath(`\\text{A capacitor has charge }Q=${Q}\\,\\mu\\mathrm{C}\\text{ and capacitance }C=${C}\\,\\mu\\mathrm{F}.\\ \\text{Find the energy stored.}`),
              s: withDisplayMath(`U=\\frac{Q^2}{2C}=\\frac{(${Q}\\times10^{-6})^2}{2\\cdot${C}\\times10^{-6}}=${(Q * Q * 1e-12 / (2 * C * 1e-6)).toExponential(2)}\\,\\mathrm{J}`),
              tag: "Capacitor energy"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{State the one-dimensional relation between electric field and potential.}`),
            s: withDisplayMath(`E_x=-\\frac{dV}{dx}`),
            tag: "Potential gradient"
          }),
          () => {
            const kappa = choice([2, 3, 4]);
            return {
              q: withDisplayMath(`\\text{A capacitor remains connected to a battery while a dielectric of }\\kappa=${kappa}\\text{ is inserted. How does the stored energy change?}`),
              s: withDisplayMath(`U'\\!=\\!\\kappa U=${kappa}U`),
              tag: "Dielectrics"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{An isolated parallel-plate capacitor has fixed charge }Q.\\ \\text{If the plate distance doubles, how does the potential difference change?}`),
            s: withDisplayMath(`V'\\!=\\!2V`),
            tag: "Isolated capacitor"
          })
        ];
        return buildPool(() => choice(factories)(), 170);
      }

      const factories = [
        () => {
          const C1 = randInt(1, 8);
          const C2 = randInt(1, 8);
          const ceq = (C1 * C2) / (C1 + C2);
          return {
            q: withDisplayMath(`\\text{Two capacitors }C_1=${C1}\\,\\mu\\mathrm{F}\\text{ and }C_2=${C2}\\,\\mu\\mathrm{F}\\text{ are in series. Find }C_{eq}.`),
            s: withDisplayMath(`C_{eq}=\\frac{C_1C_2}{C_1+C_2}=\\frac{${C1}\\cdot${C2}}${C1 + C2}=${dec(ceq)}\\,\\mu\\mathrm{F}`),
            tag: "Series capacitors"
          };
        },
        () => {
          const C1 = randInt(1, 8);
          const C2 = randInt(1, 8);
          return {
            q: withDisplayMath(`\\text{Two capacitors }C_1=${C1}\\,\\mu\\mathrm{F}\\text{ and }C_2=${C2}\\,\\mu\\mathrm{F}\\text{ are in parallel. Find }C_{eq}.`),
            s: withDisplayMath(`C_{eq}=C_1+C_2=${C1 + C2}\\,\\mu\\mathrm{F}`),
            tag: "Parallel capacitors"
          };
        },
        () => {
          const A = randInt(2, 8) / 100;
          const d = randInt(1, 8) / 1000;
          return {
            q: withDisplayMath(`\\text{A parallel-plate capacitor has area }A=${A}\\,\\mathrm{m^2}\\text{ and separation }d=${d}\\,\\mathrm{m}.\\ \\text{Write its capacitance in vacuum.}`),
            s: withDisplayMath(`C=\\varepsilon_0\\frac{A}{d}=\\varepsilon_0\\frac{${A}}{${d}}`),
            tag: "Parallel-plate capacitor"
          };
        },
        () => {
          const C = randInt(1, 8);
          const V = randInt(10, 100);
          return {
            q: withDisplayMath(`\\text{A capacitor }C=${C}\\,\\mu\\mathrm{F}\\text{ is charged at }V=${V}\\,\\mathrm{V}.\\ \\text{Find the stored energy.}`),
            s: withDisplayMath(`U=\\frac12 CV^2=\\frac12\\cdot${C}\\times10^{-6}\\cdot${V}^2=${(0.5 * C * 1e-6 * V * V).toExponential(2)}\\,\\mathrm{J}`),
            tag: "Capacitor energy"
          };
        },
        () => {
          const V = randInt(20, 120);
          const d = randInt(1, 8) / 1000;
          return {
            q: withDisplayMath(`\\text{A potential difference }V=${V}\\,\\mathrm{V}\\text{ exists across plates separated by }d=${d}\\,\\mathrm{m}.\\ \\text{Find the field magnitude.}`),
            s: withDisplayMath(`E=\\frac{V}{d}=\\frac{${V}}{${d}}=${dec(V / d)}\\,\\mathrm{V/m}`),
            tag: "Uniform field"
          };
        },
        () => {
          const kappa = choice([2, 3, 4, 5]);
          return {
            q: withDisplayMath(`\\text{A dielectric with relative permittivity }\\kappa=${kappa}\\text{ fully fills a capacitor. How does the capacitance change?}`),
            s: withDisplayMath(`C'\\!=\\!\\kappa C=${kappa}C`),
            tag: "Dielectrics"
          };
        },
        () => {
          const C1 = randInt(1, 6);
          const C2 = randInt(1, 6);
          const C3 = randInt(1, 6);
          const ceq = ((C1 + C2) * C3) / (C1 + C2 + C3);
          return {
            q: withDisplayMath(`\\text{Capacitors }C_1=${C1}\\,\\mu\\mathrm{F}\\text{ and }C_2=${C2}\\,\\mu\\mathrm{F}\\text{ are in parallel, and that combination is in series with }C_3=${C3}\\,\\mu\\mathrm{F}.\\ \\text{Find }C_{eq}.`),
            s: withDisplayMath(`C_{12}=C_1+C_2=${C1 + C2},\\quad C_{eq}=\\frac{C_{12}C_3}{C_{12}+C_3}=${dec(ceq)}\\,\\mu\\mathrm{F}`),
            tag: "Capacitor network"
          };
        },
        () => {
          const q = randInt(1, 8);
          const dv = randInt(10, 80);
          return {
            q: withDisplayMath(`\\text{A charge }q=${q}\\,\\mu\\mathrm{C}\\text{ moves through a potential difference }\\Delta V=${dv}\\,\\mathrm{V}.\\ \\text{Find the change in electric potential energy magnitude.}`),
            s: withDisplayMath(`|\\Delta U|=q\\Delta V=${q}\\times10^{-6}\\cdot${dv}=${(q * 1e-6 * dv).toExponential(2)}\\,\\mathrm{J}`),
            tag: "Potential energy"
          };
        }
      ];
      return buildPool(() => choice(factories)(), 160);
    }

    function circuitsTemplates(level = "medium") {
      const mu0 = 4 * Math.PI * 1e-7;

      if (level === "easy") {
        const factories = [
          () => {
            const R = randInt(1, 20);
            const I = randInt(1, 10);
            return {
              q: withDisplayMath(`\\text{A resistor has }R=${R}\\,\\Omega\\text{ and carries }I=${I}\\,\\mathrm{A}.\\ \\text{Find the voltage.}`),
              s: withDisplayMath(`V=RI=${R}\\cdot${I}=${R * I}\\,\\mathrm{V}`),
              tag: "Ohm law"
            };
          },
          () => {
            const R = randInt(1, 20);
            const V = randInt(5, 60);
            return {
              q: withDisplayMath(`\\text{A resistor has }R=${R}\\,\\Omega\\text{ and is connected to }V=${V}\\,\\mathrm{V}.\\ \\text{Find the current.}`),
              s: withDisplayMath(`I=\\frac{V}{R}=\\frac{${V}}{${R}}=${dec(V / R)}\\,\\mathrm{A}`),
              tag: "Ohm law"
            };
          },
          () => {
            const V = randInt(10, 80);
            const I = randInt(1, 10);
            return {
              q: withDisplayMath(`\\text{A circuit element operates at }V=${V}\\,\\mathrm{V}\\text{ and }I=${I}\\,\\mathrm{A}.\\ \\text{Find the electric power.}`),
              s: withDisplayMath(`P=VI=${V}\\cdot${I}=${V * I}\\,\\mathrm{W}`),
              tag: "Electric power"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{What is the equivalent resistance of two resistors in series?}`),
            s: withDisplayMath(`R_{eq}=R_1+R_2`),
            tag: "Series resistors"
          }),
          () => ({
            q: withDisplayMath(`\\text{What is the equivalent resistance of two resistors in parallel?}`),
            s: withDisplayMath(`R_{eq}=\\frac{R_1R_2}{R_1+R_2}`),
            tag: "Parallel resistors"
          }),
          () => {
            const I = randInt(1, 10);
            const l = randInt(1, 6) / 10;
            const B = randInt(1, 8) / 10;
            return {
              q: withDisplayMath(`\\text{A straight wire of length }l=${l}\\,\\mathrm{m}\\text{ carries }I=${I}\\,\\mathrm{A}\\text{ perpendicular to }B=${B}\\,\\mathrm{T}.\\ \\text{Find the magnetic force.}`),
              s: withDisplayMath(`F=IlB=${I}\\cdot${l}\\cdot${B}=${dec(I * l * B)}\\,\\mathrm{N}`),
              tag: "Magnetic force on wire"
            };
          },
          () => {
            const q = randInt(1, 8);
            const v = randInt(1, 8) * 1e5;
            const B = randInt(1, 8) / 10;
            return {
              q: withDisplayMath(`\\text{A charge }q=${q}\\,\\mu\\mathrm{C}\\text{ moves perpendicular to }B=${B}\\,\\mathrm{T}\\text{ with speed }v=${v}\\,\\mathrm{m/s}.\\ \\text{Find the magnetic-force magnitude.}`),
              s: withDisplayMath(`F=qvB=${q}\\times10^{-6}\\cdot${v}\\cdot${B}=${dec(q * 1e-6 * v * B)}\\,\\mathrm{N}`),
              tag: "Lorentz force"
            };
          },
          () => {
            const B = randInt(1, 8) / 10;
            const A = randInt(1, 8) / 10;
            const theta = choice([0, 30, 60]);
            return {
              q: withDisplayMath(`\\text{A surface of area }A=${A}\\,\\mathrm{m^2}\\text{ is in a uniform field }B=${B}\\,\\mathrm{T}\\text{ making angle }${theta}^{\\circ}\\text{ with the normal. Find the magnetic flux.}`),
              s: withDisplayMath(`\\Phi_B=BA\\cos\\theta=${B}\\cdot${A}\\cos(${theta}^{\\circ})=${dec(B * A * Math.cos(theta * Math.PI / 180))}\\,\\mathrm{Wb}`),
              tag: "Magnetic flux"
            };
          }
        ];
        return buildPool(() => choice(factories)(), 150);
      }

      if (level === "hard") {
        const factories = [
          () => {
            const I1 = randInt(2, 10);
            const I2 = randInt(2, 10);
            const d = randInt(1, 8) / 100;
            return {
              q: withDisplayMath(`\\text{Two long parallel wires carry }I_1=${I1}\\,\\mathrm{A}\\text{ and }I_2=${I2}\\,\\mathrm{A}\\text{ and are separated by }d=${d}\\,\\mathrm{m}.\\ \\text{Write the force per unit length.}`),
              s: withDisplayMath(`\\frac{F}{L}=\\frac{\\mu_0 I_1I_2}{2\\pi d}=\\frac{\\mu_0\\cdot${I1}\\cdot${I2}}{2\\pi\\cdot${d}}`),
              tag: "Parallel wires"
            };
          },
          () => {
            const q = choice([1.6e-19, 3.2e-19]);
            const m = choice([9.11e-31, 1.67e-27]);
            const B = randInt(1, 8) / 10;
            return {
              q: withDisplayMath(`\\text{A particle with charge }q=${q.toExponential(2)}\\,\\mathrm{C}\\text{ and mass }m=${m.toExponential(2)}\\,\\mathrm{kg}\\text{ moves in }B=${B}\\,\\mathrm{T}.\\ \\text{Write the cyclotron frequency.}`),
              s: withDisplayMath(`f=\\frac{qB}{2\\pi m}=\\frac{${q.toExponential(2)}\\cdot${B}}{2\\pi\\cdot${m.toExponential(2)}}`),
              tag: "Cyclotron motion"
            };
          },
          () => {
            const n = randInt(100, 500);
            const I = randInt(1, 8);
            return {
              q: withDisplayMath(`\\text{A long solenoid has turn density }n=${n}\\,\\mathrm{m^{-1}}\\text{ and current }I=${I}\\,\\mathrm{A}.\\ \\text{Write the magnetic field inside it.}`),
              s: withDisplayMath(`B=\\mu_0 nI=\\mu_0\\cdot${n}\\cdot${I}`),
              tag: "Solenoid"
            };
          },
          () => {
            const epsilon = randInt(6, 24);
            const r = randInt(1, 4);
            const R = randInt(2, 10);
            return {
              q: withDisplayMath(`\\text{A source of emf }\\varepsilon=${epsilon}\\,\\mathrm{V}\\text{ with internal resistance }r=${r}\\,\\Omega\\text{ is connected to an external resistor }R=${R}\\,\\Omega.\\ \\text{Find the current.}`),
              s: withDisplayMath(`I=\\frac{\\varepsilon}{R+r}=\\frac{${epsilon}}{${R + r}}=${dec(epsilon / (R + r))}\\,\\mathrm{A}`),
              tag: "Internal resistance"
            };
          },
          () => {
            const R1 = randInt(2, 8);
            const R2 = randInt(2, 8);
            const R3 = randInt(2, 8);
            const parallel = (R1 * R2) / (R1 + R2);
            return {
              q: withDisplayMath(`\\text{Resistors }R_1=${R1}\\,\\Omega\\text{ and }R_2=${R2}\\,\\Omega\\text{ are in parallel, and that combination is in series with }R_3=${R3}\\,\\Omega.\\ \\text{Find }R_{eq}.`),
              s: withDisplayMath(`R_{12}=\\frac{R_1R_2}{R_1+R_2}=${dec(parallel)}\\,\\Omega,\\quad R_{eq}=R_{12}+R_3=${dec(parallel + R3)}\\,\\Omega`),
              tag: "Resistor network"
            };
          },
          () => {
            const q = randInt(1, 8);
            const v = randInt(1, 8) * 1e5;
            const B = randInt(1, 8) / 10;
            const theta = choice([30, 45, 60]);
            return {
              q: withDisplayMath(`\\text{A charge }q=${q}\\,\\mu\\mathrm{C}\\text{ moves with speed }v=${v}\\,\\mathrm{m/s}\\text{ in }B=${B}\\,\\mathrm{T}\\text{ at angle }${theta}^{\\circ}.\\ \\text{Find the magnetic-force magnitude.}`),
              s: withDisplayMath(`F=qvB\\sin\\theta=${q}\\times10^{-6}\\cdot${v}\\cdot${B}\\sin(${theta}^{\\circ})=${dec(q * 1e-6 * v * B * Math.sin(theta * Math.PI / 180))}\\,\\mathrm{N}`),
              tag: "Lorentz force"
            };
          },
          () => {
            const V = randInt(12, 48);
            const R = randInt(2, 12);
            return {
              q: withDisplayMath(`\\text{A resistor network has equivalent resistance }R_{eq}=${R}\\,\\Omega\\text{ and is connected to }V=${V}\\,\\mathrm{V}.\\ \\text{Find the power delivered by the source.}`),
              s: withDisplayMath(`P=\\frac{V^2}{R_{eq}}=\\frac{${V}^2}{${R}}=${dec((V * V) / R)}\\,\\mathrm{W}`),
              tag: "Power"
            };
          },
          () => {
            const N = randInt(5, 40);
            const I = randInt(1, 8);
            const R = randInt(1, 6) / 10;
            return {
              q: withDisplayMath(`\\text{A circular loop has }N=${N}\\text{ turns, radius }R=${R}\\,\\mathrm{m},\\text{ and current }I=${I}\\,\\mathrm{A}.\\ \\text{Find the magnetic field at the center.}`),
              s: withDisplayMath(`B=\\frac{\\mu_0NI}{2R}=\\frac{\\mu_0\\cdot${N}\\cdot${I}}{2\\cdot${R}}=${(mu0 * N * I / (2 * R)).toExponential(2)}\\,\\mathrm{T}`),
              tag: "Circular loop"
            };
          }
        ];
        return buildPool(() => choice(factories)(), 170);
      }

      const factories = [
        () => {
          const R1 = randInt(2, 10);
          const R2 = randInt(2, 10);
          const V = randInt(12, 36);
          return {
            q: withDisplayMath(`\\text{Two resistors }R_1=${R1}\\,\\Omega\\text{ and }R_2=${R2}\\,\\Omega\\text{ are in series on a }V=${V}\\,\\mathrm{V}\\text{ source. Find the current.}`),
            s: withDisplayMath(`I=\\frac{V}{R_1+R_2}=\\frac{${V}}{${R1 + R2}}=${dec(V / (R1 + R2))}\\,\\mathrm{A}`),
            tag: "Series circuit"
          };
        },
        () => {
          const R1 = randInt(2, 10);
          const R2 = randInt(2, 10);
          const V = randInt(12, 36);
          return {
            q: withDisplayMath(`\\text{Two resistors }R_1=${R1}\\,\\Omega\\text{ and }R_2=${R2}\\,\\Omega\\text{ are in series on a }V=${V}\\,\\mathrm{V}\\text{ source. Find the voltage across }R_1.}`),
            s: withDisplayMath(`V_1=V\\frac{R_1}{R_1+R_2}=${V}\\frac{${R1}}{${R1 + R2}}=${dec(V * R1 / (R1 + R2))}\\,\\mathrm{V}`),
            tag: "Voltage divider"
          };
        },
        () => {
          const R1 = randInt(2, 10);
          const R2 = randInt(2, 10);
          return {
            q: withDisplayMath(`\\text{Two resistors }R_1=${R1}\\,\\Omega\\text{ and }R_2=${R2}\\,\\Omega\\text{ are in parallel. Find }R_{eq}.`),
            s: withDisplayMath(`R_{eq}=\\frac{R_1R_2}{R_1+R_2}=\\frac{${R1}\\cdot${R2}}{${R1 + R2}}=${dec((R1 * R2) / (R1 + R2))}\\,\\Omega`),
            tag: "Parallel resistors"
          };
        },
        () => {
          const I = randInt(1, 8);
          const R = randInt(2, 20);
          return {
            q: withDisplayMath(`\\text{A resistor }R=${R}\\,\\Omega\\text{ carries }I=${I}\\,\\mathrm{A}.\\ \\text{Find the power dissipated.}`),
            s: withDisplayMath(`P=I^2R=${I}^2\\cdot${R}=${I * I * R}\\,\\mathrm{W}`),
            tag: "Electric power"
          };
        },
        () => {
          const I = randInt(1, 8);
          const r = randInt(1, 8) / 100;
          return {
            q: withDisplayMath(`\\text{A long straight wire carries }I=${I}\\,\\mathrm{A}.\\ \\text{Find the magnetic field at }r=${r}\\,\\mathrm{m}.}`),
            s: withDisplayMath(`B=\\frac{\\mu_0I}{2\\pi r}=\\frac{\\mu_0\\cdot${I}}{2\\pi\\cdot${r}}=${(mu0 * I / (2 * Math.PI * r)).toExponential(2)}\\,\\mathrm{T}`),
            tag: "Straight wire"
          };
        },
        () => {
          const m = choice([9.11e-31, 1.67e-27]);
          const q = choice([1.6e-19, 3.2e-19]);
          const v = randInt(1, 6) * 1e5;
          const B = randInt(1, 8) / 10;
          return {
            q: withDisplayMath(`\\text{A charged particle moves perpendicular to }B=${B}\\,\\mathrm{T}\\text{ with speed }v=${v}\\,\\mathrm{m/s}.\\ \\text{Given }m=${m.toExponential(2)}\\,\\mathrm{kg},\\ q=${q.toExponential(2)}\\,\\mathrm{C},\\ \\text{find the radius of the circular trajectory.}`),
            s: withDisplayMath(`r=\\frac{mv}{qB}=\\frac{${m.toExponential(2)}\\cdot${v}}{${q.toExponential(2)}\\cdot${B}}=${(m * v / (q * B)).toExponential(2)}\\,\\mathrm{m}`),
            tag: "Charged particle in B"
          };
        },
        () => ({
          q: withDisplayMath(`\\text{Write the magnetic field at the center of a circular loop of radius }R\\text{ carrying current }I.`),
          s: withDisplayMath(`B=\\frac{\\mu_0I}{2R}`),
          tag: "Circular loop"
        }),
        () => {
          const P = randInt(20, 200);
          const V = randInt(10, 50);
          return {
            q: withDisplayMath(`\\text{A device consumes }P=${P}\\,\\mathrm{W}\\text{ at voltage }V=${V}\\,\\mathrm{V}.\\ \\text{Find the current.}`),
            s: withDisplayMath(`I=\\frac{P}{V}=\\frac{${P}}{${V}}=${dec(P / V)}\\,\\mathrm{A}`),
            tag: "Electric power"
          };
        }
      ];
      return buildPool(() => choice(factories)(), 160);
    }

    function inductionTemplates(level = "medium") {
      if (level === "easy") {
        const factories = [
          () => ({
            q: withDisplayMath(`\\text{State Faraday's law of induction.}`),
            s: withDisplayMath(`\\mathcal{E}=-\\frac{d\\Phi_B}{dt}`),
            tag: "Faraday law"
          }),
          () => {
            const N = randInt(20, 200);
            const dphi = randInt(1, 9) / 100;
            const dt = randInt(1, 5) / 10;
            return {
              q: withDisplayMath(`\\text{A coil with }N=${N}\\text{ turns undergoes a flux change }\\Delta\\Phi=${dphi}\\,\\mathrm{Wb}\\text{ in }\\Delta t=${dt}\\,\\mathrm{s}.\\ \\text{Find the average induced emf magnitude.}`),
              s: withDisplayMath(`|\\mathcal{E}|=N\\frac{\\Delta\\Phi}{\\Delta t}=${N}\\frac{${dphi}}{${dt}}=${dec(N * dphi / dt)}\\,\\mathrm{V}`),
              tag: "Induced emf"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{State Lenz's law.}`),
            s: withDisplayMath(`\\text{The induced current opposes the change in magnetic flux that produced it.}`),
            tag: "Lenz law"
          }),
          () => {
            const f = randInt(1, 9) * 1e6;
            return {
              q: withDisplayMath(`\\text{An electromagnetic wave has frequency }f=${f}\\,\\mathrm{Hz}.\\ \\text{Find the wavelength in vacuum.}`),
              s: withDisplayMath(`\\lambda=\\frac{c}{f}=\\frac{3.0\\times10^8}{${f}}=${dec(3e8 / f, 6)}\\,\\mathrm{m}`),
              tag: "EM waves"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{In a plane electromagnetic wave in vacuum, what is the relation between the field amplitudes }E\\text{ and }B\\text{?}`),
            s: withDisplayMath(`E=cB`),
            tag: "EM waves"
          }),
          () => ({
            q: withDisplayMath(`\\text{Write the electric-field energy density in vacuum.}`),
            s: withDisplayMath(`u_E=\\frac12\\varepsilon_0E^2`),
            tag: "Field energy"
          }),
          () => ({
            q: withDisplayMath(`\\text{Write the magnetic-field energy density in vacuum.}`),
            s: withDisplayMath(`u_B=\\frac{B^2}{2\\mu_0}`),
            tag: "Field energy"
          }),
          () => ({
            q: withDisplayMath(`\\text{Write the ideal-transformer voltage relation.}`),
            s: withDisplayMath(`\\frac{V_2}{V_1}=\\frac{N_2}{N_1}`),
            tag: "Transformer"
          })
        ];
        return buildPool(() => choice(factories)(), 150);
      }

      if (level === "hard") {
        const factories = [
          () => ({
            q: withDisplayMath(`\\text{State the integral form of the Ampere-Maxwell law.}`),
            s: withDisplayMath(`\\oint \\vec B\\cdot d\\vec l=\\mu_0I_{enc}+\\mu_0\\varepsilon_0\\frac{d\\Phi_E}{dt}`),
            tag: "Maxwell equations"
          }),
          () => ({
            q: withDisplayMath(`\\text{Write the displacement current in terms of the electric-flux change.}`),
            s: withDisplayMath(`I_d=\\varepsilon_0\\frac{d\\Phi_E}{dt}`),
            tag: "Displacement current"
          }),
          () => {
            const L = randInt(1, 8) / 10;
            const R = randInt(1, 20);
            return {
              q: withDisplayMath(`\\text{An RL circuit has }L=${L}\\,\\mathrm{H}\\text{ and }R=${R}\\,\\Omega.\\ \\text{Find the time constant.}`),
              s: withDisplayMath(`\\tau=\\frac{L}{R}=\\frac{${L}}{${R}}=${dec(L / R, 4)}\\,\\mathrm{s}`),
              tag: "RL circuit"
            };
          },
          () => {
            const N = randInt(20, 200);
            const B = randInt(1, 8) / 10;
            const A = randInt(1, 8) / 100;
            const omega = randInt(20, 120);
            return {
              q: withDisplayMath(`\\text{A loop with }N=${N}\\text{ turns and area }A=${A}\\,\\mathrm{m^2}\\text{ rotates in }B=${B}\\,\\mathrm{T}\\text{ with angular speed }\\omega=${omega}\\,\\mathrm{rad/s}.\\ \\text{Find the maximum induced emf.}`),
              s: withDisplayMath(`\\mathcal{E}_{max}=NBA\\omega=${N}\\cdot${B}\\cdot${A}\\cdot${omega}=${dec(N * B * A * omega)}\\,\\mathrm{V}`),
              tag: "Rotating loop"
            };
          },
          () => {
            const L = randInt(1, 8) / 1000;
            const C = randInt(1, 8) / 1000000;
            return {
              q: withDisplayMath(`\\text{An LC circuit has }L=${L}\\,\\mathrm{H}\\text{ and }C=${C}\\,\\mathrm{F}.\\ \\text{Find the resonant frequency.}`),
              s: withDisplayMath(`f=\\frac{1}{2\\pi\\sqrt{LC}}=\\frac{1}{2\\pi\\sqrt{${L}\\cdot${C}}}=${dec(1 / (2 * Math.PI * Math.sqrt(L * C)), 2)}\\,\\mathrm{Hz}`),
              tag: "LC circuit"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{Write the ideal-transformer power relation.}`),
            s: withDisplayMath(`V_1I_1=V_2I_2`),
            tag: "Transformer"
          }),
          () => {
            const f = randInt(1, 9) * 1e8;
            return {
              q: withDisplayMath(`\\text{A radio wave has frequency }f=${f}\\,\\mathrm{Hz}.\\ \\text{Find the wavelength in vacuum.}`),
              s: withDisplayMath(`\\lambda=\\frac{c}{f}=\\frac{3.0\\times10^8}{${f}}=${dec(3e8 / f, 6)}\\,\\mathrm{m}`),
              tag: "EM waves"
            };
          },
          () => {
            const N = randInt(20, 150);
            const dphi = randInt(1, 9) / 100;
            const R = randInt(1, 10);
            return {
              q: withDisplayMath(`\\text{A coil with }N=${N}\\text{ turns and resistance }R=${R}\\,\\Omega\\text{ experiences a total flux change }\\Delta\\Phi=${dphi}\\,\\mathrm{Wb}.\\ \\text{Find the total induced charge.}`),
              s: withDisplayMath(`Q=\\frac{N\\Delta\\Phi}{R}=\\frac{${N}\\cdot${dphi}}{${R}}=${dec((N * dphi) / R)}\\,\\mathrm{C}`),
              tag: "Induced charge"
            };
          }
        ];
        return buildPool(() => choice(factories)(), 170);
      }

      const factories = [
        () => {
          const N = randInt(20, 200);
          const A = randInt(1, 8) / 100;
          const dB = randInt(1, 8) / 10;
          const dt = randInt(1, 5) / 10;
          return {
            q: withDisplayMath(`\\text{A coil with }N=${N}\\text{ turns and area }A=${A}\\,\\mathrm{m^2}\\text{ experiences a field change }\\Delta B=${dB}\\,\\mathrm{T}\\text{ in }\\Delta t=${dt}\\,\\mathrm{s}.\\ \\text{Find the average induced emf.}`),
            s: withDisplayMath(`|\\mathcal{E}|=N\\frac{A\\Delta B}{\\Delta t}=${N}\\frac{${A}\\cdot${dB}}{${dt}}=${dec(N * A * dB / dt)}\\,\\mathrm{V}`),
            tag: "Faraday law"
          };
        },
        () => {
          const emf = randInt(5, 40);
          const R = randInt(1, 10);
          return {
            q: withDisplayMath(`\\text{A loop has induced emf }\\mathcal{E}=${emf}\\,\\mathrm{V}\\text{ and resistance }R=${R}\\,\\Omega.\\ \\text{Find the induced current magnitude.}`),
            s: withDisplayMath(`I=\\frac{\\mathcal{E}}{R}=\\frac{${emf}}{${R}}=${dec(emf / R)}\\,\\mathrm{A}`),
            tag: "Induced current"
          };
        },
        () => {
          const B = randInt(1, 8) / 10;
          const l = randInt(1, 8) / 10;
          const v = randInt(1, 8);
          return {
            q: withDisplayMath(`\\text{A rod of length }l=${l}\\,\\mathrm{m}\\text{ moves at }v=${v}\\,\\mathrm{m/s}\\text{ perpendicular to }B=${B}\\,\\mathrm{T}.\\ \\text{Find the motional emf.}`),
            s: withDisplayMath(`\\mathcal{E}=Blv=${B}\\cdot${l}\\cdot${v}=${dec(B * l * v)}\\,\\mathrm{V}`),
            tag: "Motional emf"
          };
        },
        () => ({
          q: withDisplayMath(`\\text{Write the self-inductance relation between flux linkage and current.}`),
          s: withDisplayMath(`N\\Phi_B=LI`),
          tag: "Inductance"
        }),
        () => {
          const L = randInt(1, 8) / 10;
          const I = randInt(1, 8);
          return {
            q: withDisplayMath(`\\text{An inductor has }L=${L}\\,\\mathrm{H}\\text{ and current }I=${I}\\,\\mathrm{A}.\\ \\text{Find the magnetic energy stored.}`),
            s: withDisplayMath(`U=\\frac12 LI^2=\\frac12\\cdot${L}\\cdot${I}^2=${dec(0.5 * L * I * I)}\\,\\mathrm{J}`),
            tag: "Inductor energy"
          };
        },
        () => {
          const N1 = randInt(50, 300);
          const N2 = randInt(50, 300);
          const V1 = randInt(12, 120);
          return {
            q: withDisplayMath(`\\text{An ideal transformer has }N_1=${N1},\\ N_2=${N2}\\text{ and primary voltage }V_1=${V1}\\,\\mathrm{V}.\\ \\text{Find the secondary voltage.}`),
            s: withDisplayMath(`V_2=V_1\\frac{N_2}{N_1}=${V1}\\frac{${N2}}{${N1}}=${dec(V1 * N2 / N1)}\\,\\mathrm{V}`),
            tag: "Transformer"
          };
        },
        () => ({
          q: withDisplayMath(`\\text{Write the resonant frequency of an LC circuit.}`),
          s: withDisplayMath(`f=\\frac{1}{2\\pi\\sqrt{LC}}`),
          tag: "LC circuit"
        }),
        () => ({
          q: withDisplayMath(`\\text{What is the Poynting vector in vacuum?}`),
          s: withDisplayMath(`\\vec S=\\frac{1}{\\mu_0}\\vec E\\times\\vec B`),
          tag: "Poynting vector"
        })
      ];
      return buildPool(() => choice(factories)(), 160);
    }


    function generatorForTopic(topic, level) {
      switch (topic) {
        case "electrostatics": return electrostaticsTemplates(level);
        case "potential": return potentialTemplates(level);
        case "circuits": return circuitsTemplates(level);
        case "induction": return inductionTemplates(level);
        default: return [];
      }
    }

    function buildExercises(topic, count, level) {
      return sampleExercises(generatorForTopic(topic, level), count);
    }

    function buildExamSheet(level) {
      const topics = ["electrostatics", "potential", "circuits", "induction"];
      return shuffle(topics.map((topic, i) => {
        const ex = choice(generatorForTopic(topic, level));
        return { index: i + 1, ...ex, examTopic: topic };
      })).map((ex, index) => ({ ...ex, index: index + 1 }));
    }

    let currentTopic = "electrostatics";
    let solutionsVisible = false;
    let currentExercises = [];

    function labelForTopic(topic) {
      switch (topic) {
        case "electrostatics": return "Electrostatics & Gauss";
        case "potential": return "Potential & Capacitors";
        case "circuits": return "Circuits & Magnetism";
        case "induction": return "Induction & EM Waves";
        case "exam": return "Exam Mode";
        default: return "Worksheet";
      }
    }

    function defaultTitleForTopic(topic) {
      switch (topic) {
        case "electrostatics": return "Electrostatics Worksheet";
        case "potential": return "Potential and Capacitors Worksheet";
        case "circuits": return "Circuits and Magnetism Worksheet";
        case "induction": return "Induction and EM Waves Worksheet";
        case "exam": return "Physics II Exam Practice";
        default: return "Physics II Worksheet";
      }
    }

    function updateTopicButtons() {
      document.querySelectorAll("#topicNav button").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.topic === currentTopic);
      });
    }

    function updatePills() {
      const level = document.getElementById("level").value;
      document.getElementById("levelPill").textContent = level.toUpperCase();
      document.getElementById("solutionsPill").textContent = solutionsVisible ? "VISIBLE" : "HIDDEN";
    }

    async function typesetMath(elements) {
      if (window.MathJax && window.MathJax.typesetPromise) {
        await window.MathJax.typesetPromise(elements);
      }
    }

    async function renderLists() {
      const exerciseList = document.getElementById("exerciseList");
      const solutionList = document.getElementById("solutionList");
      const solutionsCard = document.getElementById("solutionsCard");

      exerciseList.innerHTML = "";
      solutionList.innerHTML = "";

      currentExercises.forEach((ex) => {
        const tag = ex.examTopic ? labelForTopic(ex.examTopic).toUpperCase() : ex.tag;

        const exEl = document.createElement("div");
        exEl.className = "exercise";
        exEl.innerHTML = `
          <div class="exercise-head">
            <div class="exercise-number">Exercise ${ex.index}</div>
            <div class="tag">${tag}</div>
          </div>
          <div class="math">${ex.q}</div>
        `;
        exerciseList.appendChild(exEl);

        const solEl = document.createElement("div");
        solEl.className = "exercise";
        solEl.innerHTML = `
          <div class="exercise-head">
            <div class="exercise-number">Solution ${ex.index}</div>
            <div class="tag">${tag}</div>
          </div>
          <div class="math">${ex.s}</div>
        `;
        solutionList.appendChild(solEl);
      });

      solutionsCard.classList.toggle("hidden", !solutionsVisible);
      updatePills();
      await typesetMath([exerciseList, solutionList]);
    }

    async function generateWorksheet() {
      const titleInput = document.getElementById("title");
      const countInput = document.getElementById("count");
      const levelSelect = document.getElementById("level");
      const previewTitle = document.getElementById("previewTitle");
      const status = document.getElementById("status");

      const count = Math.max(1, Math.min(50, Number(countInput.value) || 10));
      countInput.value = count;

      const level = levelSelect.value;
      const title = titleInput.value.trim() || defaultTitleForTopic(currentTopic);
      previewTitle.textContent = title;

      currentExercises = currentTopic === "exam"
        ? buildExamSheet(level)
        : buildExercises(currentTopic, count, level);

      await renderLists();
      status.textContent = currentTopic === "exam"
        ? `Generated ${currentExercises.length} exam exercises.`
        : `Generated ${currentExercises.length} exercises.`;
    }

    async function setTopic(topic) {
      currentTopic = topic;
      const titleInput = document.getElementById("title");
      const countWrap = document.getElementById("countWrap");
      const status = document.getElementById("status");

      titleInput.value = defaultTitleForTopic(topic);
      countWrap.classList.toggle("hidden", topic === "exam");
      updateTopicButtons();
      solutionsVisible = false;
      document.getElementById("toggleSolutionsBtn").textContent = "Show solutions";
      status.textContent = "Ready.";

      await generateWorksheet();
    }

    function buildPdfMarkup() {
      const title = document.getElementById("previewTitle").textContent || "Worksheet";
      const level = document.getElementById("level").value.toUpperCase();
      const pdfLevel = withDisplayMath(`\\text{Difficulty: } ${latexText(level)}`);
      const pdfExercises = withDisplayMath(`\\text{Exercises}`);
      const pdfSolutions = withDisplayMath(`\\text{Solutions}`);

      const exerciseHtml = currentExercises.map((ex) => {
        const tag = ex.examTopic ? labelForTopic(ex.examTopic).toUpperCase() : ex.tag;
        return `
          <div class="pdf-exercise">
            <div class="pdf-head">
              <div class="pdf-num">Exercise ${ex.index}</div>
              <div class="pdf-tag">${tag}</div>
            </div>
            <div class="pdf-math">${ex.q}</div>
          </div>
        `;
      }).join("");

      const solutionHtml = currentExercises.map((ex) => {
        const tag = ex.examTopic ? labelForTopic(ex.examTopic).toUpperCase() : ex.tag;
        return `
          <div class="pdf-exercise">
            <div class="pdf-head">
              <div class="pdf-num">Solution ${ex.index}</div>
              <div class="pdf-tag">${tag}</div>
            </div>
            <div class="pdf-math">${ex.s}</div>
          </div>
        `;
      }).join("");

      return `
        <div class="pdf-page">
          <div class="pdf-title">${title}</div>
          <div class="pdf-meta">${pdfLevel}</div>
          <div class="pdf-section-title">${pdfExercises}</div>
          ${exerciseHtml}
        </div>
        ${solutionsVisible ? `
        <div class="pdf-page">
          <div class="pdf-title">${title}</div>
          <div class="pdf-meta">${pdfSolutions}</div>
          <div class="pdf-section-title">${pdfSolutions}</div>
          ${solutionHtml}
        </div>` : ""}
      `;
    }

    async function downloadPdf() {
      const status = document.getElementById("status");
      const title = document.getElementById("previewTitle").textContent || "worksheet";

      try {
        if (!window.LatexPdfExport || !window.LatexPdfExport.exportWorksheet) {
          throw new Error("LaTeX PDF export helper not loaded.");
        }

        status.textContent = "Compiling LaTeX PDF...";

        const exercises = currentExercises.map((ex, index) => {
          const tag = ex.examTopic
            ? (typeof labelForTopic === "function"
                ? labelForTopic(ex.examTopic)
                : window.LatexPdfExport.humanizeSlug(ex.examTopic))
            : ex.tag;

          return {
            index: ex.index ?? index + 1,
            tag,
            q: ex.q,
            s: ex.s
          };
        });

        await window.LatexPdfExport.exportWorksheet({
          title,
          subject: document.title || "Worksheet",
          difficulty: document.getElementById("level").value.toUpperCase(),
          includeSolutions: solutionsVisible,
          exercises
        });

        status.textContent = "LaTeX PDF downloaded successfully.";
      } catch (err) {
        status.textContent = err?.message || "LaTeX PDF generation failed.";
        console.error(err);
      }
    }

    document.getElementById("generateBtn").addEventListener("click", generateWorksheet);
    document.getElementById("toggleSolutionsBtn").addEventListener("click", async () => {
      solutionsVisible = !solutionsVisible;
      document.getElementById("toggleSolutionsBtn").textContent = solutionsVisible ? "Hide solutions" : "Show solutions";
      await renderLists();
    });
    document.getElementById("downloadBtn").addEventListener("click", downloadPdf);
    document.getElementById("level").addEventListener("change", async () => {
      updatePills();
      await generateWorksheet();
    });

    document.querySelectorAll("#topicNav button").forEach((btn) => {
      btn.addEventListener("click", () => setTopic(btn.dataset.topic));
    });

    setTopic("electrostatics");
  </script>
</body>
</html>
  </textarea>

  <script>
    function loadIframeContent(frameId, sourceId) {
      const frame = document.getElementById(frameId);
      const source = document.getElementById(sourceId);
      frame.srcdoc = source.value;
    }

    function activatePanel(target) {
      const buttons = document.querySelectorAll('.tab-btn');
      const panels = document.querySelectorAll('.panel');

      buttons.forEach((button) => {
        button.classList.toggle('active', button.dataset.target === target);
      });

      panels.forEach((panel) => {
        panel.classList.toggle('active', panel.id === target);
      });
    }

    function readRequestedSection() {
      const params = new URLSearchParams(window.location.search);
      const subject = (params.get('subject') || '').toLowerCase();

      const sectionMap = {
        'calculus-i': 'section1',
        'calculus-1': 'section1',
        'calculus-ii': 'section2',
        'calculus-2': 'section2',
        'linear-algebra': 'section3',
        'linear-algebra-and-geometry': 'section3',
        'geometry': 'section3',
        'statistics': 'section4',
        'physics-i': 'section5',
        'physics-1': 'section5',
        'physics-ii': 'section6',
        'physics-2': 'section6',
        'electromagnetism': 'section6'
      };

      return sectionMap[subject] || 'section1';
    }

    loadIframeContent('frame-section1', 'src-section1');
    loadIframeContent('frame-section2', 'src-section2');
    loadIframeContent('frame-section3', 'src-section3');
    loadIframeContent('frame-section4', 'src-section4');
    loadIframeContent('frame-section5', 'src-section5');
    loadIframeContent('frame-section6', 'src-section6');

    const buttons = document.querySelectorAll('.tab-btn');

    buttons.forEach((button) => {
      button.addEventListener('click', () => {
        const target = button.dataset.target;
        activatePanel(target);

        const slugMap = {
          section1: 'calculus-i',
          section2: 'calculus-ii',
          section3: 'linear-algebra',
          section4: 'statistics',
          section5: 'physics-i',
          section6: 'physics-ii'
        };

        const nextUrl = `${window.location.pathname}?subject=${slugMap[target] || 'calculus-i'}`;
        window.history.replaceState({}, '', nextUrl);
      });
    });

    activatePanel(readRequestedSection());
  </script>

</body>
</html>
