      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
    }
    input, select, button {
      width: 100%;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #121933;
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }
    input:focus, select:focus {
      border-color: rgba(115,167,255,0.65);
      box-shadow: 0 0 0 4px rgba(115,167,255,0.12);
    }
    button { cursor: pointer; font-weight: 800; transition: 0.2s ease; }
    button:hover { transform: translateY(-1px); }
    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      box-shadow: 0 14px 28px rgba(115,167,255,0.25);
    }
    .secondary { background: rgba(255,255,255,0.06); }

    .preview-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .level-pill {
      display: inline-block;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      color: #dce5ff;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .exercise {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-top: 14px;
      background: rgba(255,255,255,0.03);
    }
    .exercise-head {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .tag {
      display: inline-block;
      font-size: 0.78rem;
      color: var(--tag-text);
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      padding: 5px 9px;
      border-radius: 999px;
      font-weight: 700;
    }
    .exercise-number {
      color: var(--muted);
      font-weight: 700;
      font-size: 0.95rem;
    }
    .math {
      font-size: 1.08rem;
      line-height: 1.75;
      overflow-wrap: anywhere;
    }
    .solutions-card.hidden, .hidden { display: none !important; }
    .footer-copy {
      margin-top: 28px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.95rem;
    }

    #pdfArea {
      position: absolute;
      left: -99999px;
      top: 0;
      width: 794px;
      background: white;
      color: black;
      padding: 40px;
    }
    .pdf-page {
      width: 100%;
      min-height: 1040px;
      padding: 10px 0 30px;
      background: white;
      color: black;
      page-break-after: always;
    }
    .pdf-page:last-child { page-break-after: auto; }
    .pdf-title { font-size: 28px; font-weight: 700; margin-bottom: 6px; color: black; }
    .pdf-meta { font-size: 14px; color: #333; margin-bottom: 22px; }
    .pdf-section-title { font-size: 20px; font-weight: 700; margin: 10px 0 18px; color: black; }
    .pdf-exercise {
      border: 1px solid #d6d6d6;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 12px;
      background: #fff;
      break-inside: avoid;
    }
    .pdf-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .pdf-tag {
      display: inline-block;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef7f4;
      border: 1px solid #cbe9df;
      color: #165c4f;
      font-weight: 700;
    }
    .pdf-num { color: #444; font-weight: 700; font-size: 13px; }
    .pdf-math { color: black; font-size: 16px; line-height: 1.6; }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .hero-badge { width: 72px; height: 72px; font-size: 28px; }
      .grid { grid-template-columns: 1fr; }
      .settings-card { position: static; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-badge">&Phi;</div>
      <div>
        <h1>Physics I Worksheet Generator</h1>
        <p>
          Create university-style practice sheets for kinematics, Newtonian dynamics,
          work and energy, momentum and collisions, thermodynamics, and mixed exam-mode practice.
          Only formulas, exercises, and solutions are rendered in LaTeX.
        </p>
      </div>
    </section>

    <div class="topic-nav" id="topicNav">
      <button data-topic="kinematics" class="active">Kinematics</button>
      <button data-topic="dynamics">Dynamics & Energy</button>
      <button data-topic="momentum">Momentum & Collisions</button>
      <button data-topic="thermo">Thermodynamics</button>
      <button data-topic="exam">Exam Mode</button>
    </div>

    <div class="grid">
      <div class="card settings-card stack">
        <div>
          <h2>Settings</h2>
          <div class="subtle">Choose a topic, difficulty, and generate a fresh exam-style worksheet instantly.</div>
        </div>

        <div>
          <label for="title">Worksheet title</label>
          <input id="title" value="Physics I Worksheet" />
        </div>

        <div id="countWrap">
          <label for="count">Number of exercises</label>
          <input id="count" type="number" min="1" max="50" value="10" />
        </div>

        <div>
          <label for="level">Difficulty</label>
          <select id="level">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>

        <button class="primary" id="generateBtn">Generate worksheet</button>
        <button class="secondary" id="toggleSolutionsBtn">Show solutions</button>
        <button class="secondary" id="downloadBtn">Download LaTeX PDF</button>

        <div class="status" id="status">Ready.</div>
      </div>

      <div>
        <div class="card">
          <div class="preview-title-row">
            <h2 id="previewTitle" style="margin: 0;">Physics I Worksheet</h2>
            <div class="level-pill" id="levelPill">MEDIUM</div>
          </div>
          <div id="exerciseList"></div>
        </div>

        <div class="card solutions-card hidden" id="solutionsCard" style="margin-top: 24px;">
          <div class="preview-title-row">
            <h2 style="margin: 0;">Solutions</h2>
            <div class="level-pill" id="solutionsPill">HIDDEN</div>
          </div>
          <div id="solutionList"></div>
        </div>
      </div>
    </div>

    <div class="footer-copy">
      In Exam Mode, the generator creates one exercise for each of the four core topics.
    </div>
  </div>

  <div id="pdfArea"></div>

  <script>
    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const choice = (arr) => arr[Math.floor(Math.random() * arr.length)];

    function withDisplayMath(latex) {
      return `\\[${latex}\\]`;
    }

    function latexText(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/%/g, "\\%")
        .replace(/_/g, "\\_")
        .replace(/&/g, "\\&")
        .replace(/#/g, "\\#");
    }

    function dec(num, digits = 2) {
      return Number(num.toFixed(digits));
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildPool(factory, size = 100) {
      const seen = new Set();
      const out = [];
      let attempts = 0;
      while (out.length < size && attempts < size * 50) {
        attempts += 1;
        const ex = factory();
        const key = `${ex.q}=>${ex.s}`;
        if (seen.has(key)) continue;
        seen.add(key);
        out.push(ex);
      }
      return shuffle(out);
    }

    function sampleExercises(pool, count) {
      if (!Array.isArray(pool) || pool.length === 0) return [];
      const out = [];
      while (out.length < count) {
        for (const ex of shuffle(pool)) {
          out.push(ex);
          if (out.length >= count) break;
        }
      }
      return out.slice(0, count).map((ex, index) => ({
        index: index + 1,
        q: ex.q,
        s: ex.s,
        tag: ex.tag,
        examTopic: ex.examTopic
      }));
    }

    function kinematicsTemplates(level = "medium") {
      if (level === "easy") {
        return buildPool(() => {
          const v = randInt(2, 12);
          const t = randInt(2, 10);
          const a = randInt(1, 5);
          const type = randInt(1, 8);
          switch (type) {
            case 1:
              return { q: withDisplayMath(`\\text{A particle moves with constant speed }v=${v}\\,\\mathrm{m/s}\\text{ for }t=${t}\\,\\mathrm{s}.\\ \\text{Find the distance traveled.}`), s: withDisplayMath(`s=vt=${v}\\cdot${t}=${v * t}\\,\\mathrm{m}`), tag: "Uniform motion" };
            case 2:
              return { q: withDisplayMath(`\\text{A body starts from rest with constant acceleration }a=${a}\\,\\mathrm{m/s^2}.\\ \\text{Find the speed after }t=${t}\\,\\mathrm{s}.`), s: withDisplayMath(`v=at=${a}\\cdot${t}=${a * t}\\,\\mathrm{m/s}`), tag: "Uniform acceleration" };
            case 3:
              return { q: withDisplayMath(`\\text{A body starts from rest with constant acceleration }a=${a}\\,\\mathrm{m/s^2}.\\ \\text{Find the distance after }t=${t}\\,\\mathrm{s}.`), s: withDisplayMath(`s=\\frac12 at^2=\\frac12\\cdot${a}\\cdot${t}^2=${0.5 * a * t * t}\\,\\mathrm{m}`), tag: "Uniform acceleration" };
            case 4:
              return { q: withDisplayMath(`\\text{A projectile is launched vertically upward with }v_0=${v}\\,\\mathrm{m/s}.\\ \\text{Using }g=9.8\\,\\mathrm{m/s^2},\\ \\text{find the maximum height.}`), s: withDisplayMath(`h_{\\max}=\\frac{v_0^2}{2g}=\\frac{${v}^2}{19.6}=${dec(v*v/19.6)}\\,\\mathrm{m}`), tag: "Vertical motion" };
            case 5:
              return { q: withDisplayMath(`\\text{A body moves with }x(t)=3t^2+2t.\\ \\text{Find }v(t).`), s: withDisplayMath(`v(t)=\\frac{dx}{dt}=6t+2`), tag: "Position law" };
            case 6:
              return { q: withDisplayMath(`\\text{A body moves with }v(t)=4t-1.\\ \\text{Find }a(t).`), s: withDisplayMath(`a(t)=\\frac{dv}{dt}=4`), tag: "Velocity law" };
            case 7:
              return { q: withDisplayMath(`\\text{A runner completes }400\\,\\mathrm{m}\\text{ in }50\\,\\mathrm{s}.\\ \\text{Find the average speed.}`), s: withDisplayMath(`v_{\\text{avg}}=\\frac{400}{50}=8\\,\\mathrm{m/s}`), tag: "Average speed" };
            default:
              return { q: withDisplayMath(`\\text{For rectilinear motion with constant acceleration, write the relation between }v,v_0,a,s.`), s: withDisplayMath(`v^2=v_0^2+2as`), tag: "Formula recall" };
          }
        }, 100);
      }

      if (level === "hard") {
        return buildPool(() => {
          const v0 = randInt(8, 20);
          const a = randInt(2, 7);
          const t = randInt(3, 10);
          const theta = [30, 45, 60][randInt(0,2)];
          const type = randInt(1, 10);
          switch (type) {
            case 1:
              return { q: withDisplayMath(`\\text{A particle has }x(t)=t^3-6t^2+9t.\\ \\text{Find the times when the velocity is zero.}`), s: withDisplayMath(`v(t)=3t^2-12t+9=3(t-1)(t-3),\\quad t=1,3`), tag: "Polynomial motion" };
            case 2:
              return { q: withDisplayMath(`\\text{A projectile is launched with }v_0=${v0}\\,\\mathrm{m/s}\\text{ at angle }${theta}^\\circ.\\ \\text{Find the time of flight using }g=9.8\\,\\mathrm{m/s^2}.`), s: withDisplayMath(`T=\\frac{2v_0\\sin\\theta}{g}=\\frac{2\\cdot${v0}\\sin(${theta}^\\circ)}{9.8}=${dec(2*v0*Math.sin(theta*Math.PI/180)/9.8)}\\,\\mathrm{s}`), tag: "Projectile motion" };
            case 3:
              return { q: withDisplayMath(`\\text{A body moves with }v(t)=2t^2-4t+1.\\ \\text{Find the displacement from }t=0\\text{ to }t=${t}.`), s: withDisplayMath(`\\Delta x=\\left[\\frac{2}{3}t^3-2t^2+t\\right]_0^{${t}}=${dec((2/3)*t*t*t-2*t*t+t)}`), tag: "Integral kinematics" };
            case 4:
              return { q: withDisplayMath(`\\text{A body is thrown upward with }v_0=${v0}\\,\\mathrm{m/s}.\\ \\text{Find the time to reach the top.}`), s: withDisplayMath(`t_{\\max}=\\frac{v_0}{g}=\\frac{${v0}}{9.8}=${dec(v0/9.8)}\\,\\mathrm{s}`), tag: "Vertical motion" };
            case 5:
              return { q: withDisplayMath(`\\text{Two bodies start from the same point. The first moves with constant speed }${v0}\\,\\mathrm{m/s},\\text{ the second starts from rest with }a=${a}\\,\\mathrm{m/s^2}.\\ \\text{Find when they meet again.}`), s: withDisplayMath(`v_0t=\\frac12 at^2\\Rightarrow t=\\frac{2v_0}{a}=\\frac{2\\cdot${v0}}{${a}}=${dec(2*v0/a)}\\,\\mathrm{s}`), tag: "Comparing motions" };
            case 6:
              return { q: withDisplayMath(`\\text{A particle moves on a circle of radius }R=2\\,\\mathrm{m}\\text{ with angular speed }\\omega=3\\,\\mathrm{rad/s}.\\ \\text{Find the centripetal acceleration.}`), s: withDisplayMath(`a_c=\\omega^2R=9\\cdot2=18\\,\\mathrm{m/s^2}`), tag: "Circular motion" };
            case 7:
              return { q: withDisplayMath(`\\text{Write the vector decomposition of projectile motion in horizontal and vertical directions.}`), s: withDisplayMath(`x(t)=v_0\\cos\\theta\\,t,\\quad y(t)=v_0\\sin\\theta\\,t-\\frac12 gt^2`), tag: "Projectile formulas" };
            case 8:
              return { q: withDisplayMath(`\\text{For uniform circular motion, relate tangential speed }v\\text{ to angular speed }\\omega\\text{ and radius }R.`), s: withDisplayMath(`v=\\omega R`), tag: "Circular motion" };
            case 9:
              return { q: withDisplayMath(`\\text{A car brakes with constant deceleration }a=${a}\\,\\mathrm{m/s^2}\\text{ from }v_0=${v0}\\,\\mathrm{m/s}.\\ \\text{Find the stopping distance.}`), s: withDisplayMath(`s=\\frac{v_0^2}{2a}=\\frac{${v0}^2}{2\\cdot${a}}=${dec(v0*v0/(2*a))}\\,\\mathrm{m}`), tag: "Braking distance" };
            default:
              return { q: withDisplayMath(`\\text{A particle has }x(t)=4t-t^2.\\ \\text{Find the instant when it changes direction.}`), s: withDisplayMath(`v(t)=4-2t=0\\Rightarrow t=2\\,\\mathrm{s}`), tag: "Direction change" };
          }
        }, 110);
      }

      return buildPool(() => {
        const v = randInt(4, 14);
        const t = randInt(2, 8);
        const a = randInt(1, 5);
        const type = randInt(1, 10);
        switch (type) {
          case 1:
            return { q: withDisplayMath(`\\text{A particle moves with constant speed }${v}\\,\\mathrm{m/s}\\text{ for }${t}\\,\\mathrm{s}.\\ \\text{Find the distance.}`), s: withDisplayMath(`${v*t}\\,\\mathrm{m}`), tag: "Uniform motion" };
          case 2:
            return { q: withDisplayMath(`\\text{A body starts from rest with }a=${a}\\,\\mathrm{m/s^2}.\\ \\text{Find the speed after }${t}\\,\\mathrm{s}.`), s: withDisplayMath(`${a*t}\\,\\mathrm{m/s}`), tag: "Acceleration" };
          case 3:
            return { q: withDisplayMath(`\\text{A body starts from rest with }a=${a}\\,\\mathrm{m/s^2}.\\ \\text{Find the distance after }${t}\\,\\mathrm{s}.`), s: withDisplayMath(`${0.5*a*t*t}\\,\\mathrm{m}`), tag: "Acceleration" };
          case 4:
            return { q: withDisplayMath(`\\text{A body moves with }x(t)=5t^2-t.\\ \\text{Find }v(t).`), s: withDisplayMath(`v(t)=10t-1`), tag: "Position law" };
          case 5:
            return { q: withDisplayMath(`\\text{A body moves with }v(t)=6t+2.\\ \\text{Find }a(t).`), s: withDisplayMath(`a(t)=6`), tag: "Velocity law" };
          case 6:
            return { q: withDisplayMath(`\\text{A runner covers }300\\,\\mathrm{m}\\text{ in }30\\,\\mathrm{s}.\\ \\text{Find the average speed.}`), s: withDisplayMath(`10\\,\\mathrm{m/s}`), tag: "Average speed" };
          case 7:
            return { q: withDisplayMath(`\\text{Write the law }v=v_0+at.`), s: withDisplayMath(`v=v_0+at`), tag: "Formula recall" };
          case 8:
            return { q: withDisplayMath(`\\text{Write the law }s=v_0t+\\frac12 at^2.`), s: withDisplayMath(`s=v_0t+\\frac12 at^2`), tag: "Formula recall" };
          case 9:
            return { q: withDisplayMath(`\\text{For circular motion of radius }R,\\text{ write the centripetal acceleration in terms of }v.`), s: withDisplayMath(`a_c=\\frac{v^2}{R}`), tag: "Circular motion" };
          default:
            return { q: withDisplayMath(`\\text{A body is thrown upward with }v_0=${v}\\,\\mathrm{m/s}.\\ \\text{Using }g=9.8,\\text{ find the time to the top.}`), s: withDisplayMath(`${dec(v/9.8)}\\,\\mathrm{s}`), tag: "Vertical motion" };
        }
      }, 100);
    }

    function dynamicsTemplates(level = "medium") {
      if (level === "easy") {
        return buildPool(() => {
          const m = randInt(1, 8);
          const a = randInt(1, 6);
          const h = randInt(1, 10);
          const k = randInt(20, 120);
          const x = randInt(1, 5) / 10;
          const type = randInt(1, 8);
          switch (type) {
            case 1:
              return { q: withDisplayMath(`\\text{A mass }m=${m}\\,\\mathrm{kg}\\text{ has acceleration }a=${a}\\,\\mathrm{m/s^2}.\\ \\text{Find the net force.}`), s: withDisplayMath(`F=ma=${m}\\cdot${a}=${m*a}\\,\\mathrm{N}`), tag: "Newton's second law" };
            case 2:
              return { q: withDisplayMath(`\\text{A }${m}\\,\\mathrm{kg}\\text{ body is lifted by }h=${h}\\,\\mathrm{m}.\\ \\text{Using }g=9.8,\\text{ find the change in potential energy.}`), s: withDisplayMath(`\\Delta U = mgh = ${m}\\cdot9.8\\cdot${h}=${dec(m*9.8*h)}\\,\\mathrm{J}`), tag: "Potential energy" };
            case 3:
              return { q: withDisplayMath(`\\text{A spring with }k=${k}\\,\\mathrm{N/m}\\text{ is compressed by }x=${x}\\,\\mathrm{m}.\\ \\text{Find the elastic energy.}`), s: withDisplayMath(`E_e=\\frac12 kx^2=\\frac12\\cdot${k}\\cdot${x}^2=${dec(0.5*k*x*x)}\\,\\mathrm{J}`), tag: "Elastic energy" };
            case 4:
              return { q: withDisplayMath(`\\text{A force }F=10\\,\\mathrm{N}\\text{ acts along the motion over }s=4\\,\\mathrm{m}.\\ \\text{Find the work.}`), s: withDisplayMath(`W=Fs=10\\cdot4=40\\,\\mathrm{J}`), tag: "Work" };
            case 5:
              return { q: withDisplayMath(`\\text{State the work-energy theorem.}`), s: withDisplayMath(`W_{\\text{net}}=\\Delta K`), tag: "Theory" };
            case 6:
              return { q: withDisplayMath(`\\text{A }2\\,\\mathrm{kg}\\text{ body moves at }3\\,\\mathrm{m/s}.\\ \\text{Find the kinetic energy.}`), s: withDisplayMath(`K=\\frac12 mv^2=\\frac12\\cdot2\\cdot3^2=9\\,\\mathrm{J}`), tag: "Kinetic energy" };
            case 7:
              return { q: withDisplayMath(`\\text{On a frictionless surface, a force }F=12\\,\\mathrm{N}\\text{ acts on }m=3\\,\\mathrm{kg}.\\ \\text{Find the acceleration.}`), s: withDisplayMath(`a=\\frac{F}{m}=4\\,\\mathrm{m/s^2}`), tag: "Newton's second law" };
            default:
              return { q: withDisplayMath(`\\text{State Hooke's law for a spring.}`), s: withDisplayMath(`F=-kx`), tag: "Spring law" };
          }
        }, 100);
      }

      if (level === "hard") {
        return buildPool(() => {
          const m = randInt(2, 10);
          const mu = [0.1,0.2,0.3,0.4][randInt(0,3)];
          const theta = [30, 45, 60][randInt(0,2)];
          const v = randInt(4, 14);
          const h = randInt(2, 12);
          const type = randInt(1, 10);
          switch (type) {
            case 1:
              return { q: withDisplayMath(`\\text{A block of mass }${m}\\,\\mathrm{kg}\\text{ slides on a horizontal surface with coefficient }\\mu=${mu}.\\ \\text{Find the friction force using }g=9.8.`), s: withDisplayMath(`f=\\mu mg=${mu}\\cdot${m}\\cdot9.8=${dec(mu*m*9.8)}\\,\\mathrm{N}`), tag: "Friction" };
            case 2:
              return { q: withDisplayMath(`\\text{A }${m}\\,\\mathrm{kg}\\text{ block rests on an incline }\\theta=${theta}^\\circ.\\ \\text{Find the component of weight along the plane.}`), s: withDisplayMath(`mg\\sin\\theta=${m}\\cdot9.8\\sin(${theta}^\\circ)=${dec(m*9.8*Math.sin(theta*Math.PI/180))}\\,\\mathrm{N}`), tag: "Inclined plane" };
            case 3:
              return { q: withDisplayMath(`\\text{A }${m}\\,\\mathrm{kg}\\text{ body moves at }${v}\\,\\mathrm{m/s}.\\ \\text{What work is needed to stop it?}`), s: withDisplayMath(`W=\\Delta K=0-\\frac12 mv^2=-\\frac12\\cdot${m}\\cdot${v}^2=${-0.5*m*v*v}\\,\\mathrm{J}`), tag: "Work-energy" };
            case 4:
              return { q: withDisplayMath(`\\text{A body falls from height }${h}\\,\\mathrm{m}.\\ \\text{Neglecting air resistance, find the speed just before impact.}`), s: withDisplayMath(`v=\\sqrt{2gh}=\\sqrt{2\\cdot9.8\\cdot${h}}=${dec(Math.sqrt(19.6*h))}\\,\\mathrm{m/s}`), tag: "Energy conservation" };
            case 5:
              return { q: withDisplayMath(`\\text{A spring }k=80\\,\\mathrm{N/m}\\text{ stores }10\\,\\mathrm{J}.\\ \\text{Find the compression.}`), s: withDisplayMath(`10=\\frac12 kx^2\\Rightarrow x=\\sqrt{\\frac{20}{80}}=0.5\\,\\mathrm{m}`), tag: "Spring energy" };
            case 6:
              return { q: withDisplayMath(`\\text{State the condition for mechanical energy conservation.}`), s: withDisplayMath(`\\text{Only conservative forces do work.}`), tag: "Theory" };
            case 7:
              return { q: withDisplayMath(`\\text{A force }\\vec F=(3,4)\\,\\mathrm{N}\\text{ produces a displacement }\\vec s=(2,0)\\,\\mathrm{m}.\\ \\text{Find the work.}`), s: withDisplayMath(`W=\\vec F\\cdot\\vec s = 3\\cdot2+4\\cdot0=6\\,\\mathrm{J}`), tag: "Dot product work" };
            case 8:
              return { q: withDisplayMath(`\\text{A }5\\,\\mathrm{kg}\\text{ mass moves in a circle of radius }2\\,\\mathrm{m}\\text{ at }4\\,\\mathrm{m/s}.\\ \\text{Find the centripetal force.}`), s: withDisplayMath(`F_c=\\frac{mv^2}{R}=\\frac{5\\cdot16}{2}=40\\,\\mathrm{N}`), tag: "Circular dynamics" };
            case 9:
              return { q: withDisplayMath(`\\text{A body is pulled with a constant force parallel to motion, producing }W=120\\,\\mathrm{J}\\text{ over }s=6\\,\\mathrm{m}.\\ \\text{Find the force.}`), s: withDisplayMath(`F=\\frac{W}{s}=20\\,\\mathrm{N}`), tag: "Work" };
            default:
              return { q: withDisplayMath(`\\text{Write Newton's third law.}`), s: withDisplayMath(`\\vec F_{AB}=-\\vec F_{BA}`), tag: "Theory" };
          }
        }, 110);
      }

      return buildPool(() => {
        const m = randInt(1, 8);
        const a = randInt(1, 6);
        const v = randInt(3, 12);
        const h = randInt(2, 10);
        const type = randInt(1, 10);

            const mBlock = randInt(1, 4);
            return {
              q: withDisplayMath(`\\text{A bullet of mass }${mBullet}\\,\\mathrm{kg}\\text{ embeds in a block of mass }${mBlock}\\,\\mathrm{kg}\\text{ at rest. The bullet speed is }${vBullet}\\,\\mathrm{m/s}.\\ \\text{Find the common speed immediately after impact.}`),
              s: withDisplayMath(`v_f=\\frac{m_bv_b}{m_b+m_B}=\\frac{${mBullet}\\cdot${vBullet}}{${mBullet + mBlock}}=${dec((mBullet * vBullet) / (mBullet + mBlock))}\\,\\mathrm{m/s}`),
              tag: "Ballistic impact"
            };
          },
          () => {
            const e = choice([0.2, 0.4, 0.6, 0.8]);
            const v1 = randInt(4, 12);
            return {
              q: withDisplayMath(`\\text{Two equal masses collide head-on in one dimension. Initially }v_1=${v1}\\,\\mathrm{m/s}\\text{ and }v_2=0.\\ \\text{If the coefficient of restitution is }e=${e},\\ \\text{find the final speeds.}`),
              s: withDisplayMath(`v_1'=\\frac{1-e}{2}v_1=${dec(((1 - e) * v1) / 2)}\\,\\mathrm{m/s},\\quad v_2'=\\frac{1+e}{2}v_1=${dec(((1 + e) * v1) / 2)}\\,\\mathrm{m/s}`),
              tag: "Restitution"
            };
          },
          () => {
            const m = randInt(1, 4);
            const v1 = randInt(2, 8);
            const v2 = -randInt(2, 6);
            const dt = choice([0.05, 0.1, 0.2]);
            return {
              q: withDisplayMath(`\\text{A body of mass }m=${m}\\,\\mathrm{kg}\\text{ changes velocity from }${v1}\\text{ to }${v2}\\,\\mathrm{m/s}\\text{ in }\\Delta t=${dt}\\,\\mathrm{s}.\\ \\text{Find the average force.}`),
              s: withDisplayMath(`F_{avg}=\\frac{m(v_f-v_i)}{\\Delta t}=\\frac{${m}(${v2}-${v1})}{${dt}}=${dec((m * (v2 - v1)) / dt)}\\,\\mathrm{N}`),
              tag: "Impulse"
            };
          },
          () => {
            const vAfter = randInt(2, 8);
            return {
              q: withDisplayMath(`\\text{In a ballistic pendulum experiment, the block+projectile system leaves the collision with speed }${vAfter}\\,\\mathrm{m/s}.\\ \\text{Assuming no losses during the swing, find the maximum rise height.}`),
              s: withDisplayMath(`mgh=\\frac12 mv^2\\Rightarrow h=\\frac{v^2}{2g}=\\frac{${vAfter}^2}{2\\cdot9.81}=${dec((vAfter * vAfter) / 19.62)}\\,\\mathrm{m}`),
              tag: "Ballistic pendulum"
            };
          },
          () => {
            const m1 = randInt(1, 4);
            const m2 = randInt(1, 4);
            const v1 = randInt(2, 8);
            return {
              q: withDisplayMath(`\\text{A system initially at rest explodes into two fragments of masses }${m1}\\,\\mathrm{kg}\\text{ and }${m2}\\,\\mathrm{kg}.\\ \\text{If the first fragment has speed }${v1}\\,\\mathrm{m/s},\\ \\text{find the speed of the second fragment.}`),
              s: withDisplayMath(`m_1v_1+m_2v_2=0\\Rightarrow v_2=-\\frac{${m1}}{${m2}}\\cdot${v1}=${dec(-(m1 * v1) / m2)}\\,\\mathrm{m/s}`),
              tag: "Explosion"
            };
          },
          () => {
            const p1 = randInt(10, 25);
            const p2 = randInt(6, 18);
            const M = randInt(2, 8);
            return {
              q: withDisplayMath(`\\text{A system has total momentum }p_{tot}=${p1 + p2}\\,\\mathrm{kg\\,m/s}\\text{ and total mass }M=${M}\\,\\mathrm{kg}.\\ \\text{Find the center-of-mass speed.}`),
              s: withDisplayMath(`v_{cm}=\\frac{p_{tot}}{M}=\\frac{${p1 + p2}}{${M}}=${dec((p1 + p2) / M)}\\,\\mathrm{m/s}`),
              tag: "Center of mass"
            };
          },
          () => {
            const J = randInt(10, 40);
            const p0 = randInt(5, 20);
            return {
              q: withDisplayMath(`\\text{A particle initially has momentum }p_0=${p0}\\,\\mathrm{kg\\,m/s}.\\ \\text{An external impulse }J=${J}\\,\\mathrm{N\\,s}\\text{ acts in the same direction. Find the final momentum.}`),
              s: withDisplayMath(`p_f=p_0+J=${p0}+${J}=${p0 + J}\\,\\mathrm{kg\\,m/s}`),
              tag: "Impulse-momentum"
            };
          }
        ];
        return buildPool(() => choice(factories)(), 170);
      }

      const factories = [
        () => {
          const m1 = randInt(1, 5);
          const m2 = randInt(1, 5);
          const v1 = randInt(3, 10);
          const v2 = randInt(-2, 4);
          return {
            q: withDisplayMath(`\\text{Two carts of masses }m_1=${m1}\\,\\mathrm{kg}\\text{ and }m_2=${m2}\\,\\mathrm{kg}\\text{ move with }v_1=${v1}\\text{ and }v_2=${v2}\\,\\mathrm{m/s}.\\ \\text{They stick together. Find the final speed.}`),
            s: withDisplayMath(`v_f=\\frac{m_1v_1+m_2v_2}{m_1+m_2}=\\frac{${m1 * v1 + m2 * v2}}{${m1 + m2}}=${dec((m1 * v1 + m2 * v2) / (m1 + m2))}\\,\\mathrm{m/s}`),
            tag: "Inelastic collision"
          };
        },
        () => {
          const bullet = choice([0.01, 0.02, 0.03]);
          const block = randInt(1, 4);
          const speed = randInt(180, 320);
          return {
            q: withDisplayMath(`\\text{A bullet of mass }${bullet}\\,\\mathrm{kg}\\text{ embeds in a block of mass }${block}\\,\\mathrm{kg}\\text{ at rest. The bullet speed is }${speed}\\,\\mathrm{m/s}.\\ \\text{Find the final speed.}`),
            s: withDisplayMath(`v_f=\\frac{m_bv_b}{m_b+m_B}=\\frac{${bullet}\\cdot${speed}}{${bullet + block}}=${dec((bullet * speed) / (bullet + block))}\\,\\mathrm{m/s}`),
            tag: "Ballistic impact"
          };
        },
        () => {
          const a = randInt(2, 6);
          const b = randInt(1, 4);
          const t = randInt(2, 5);
          return {
            q: withDisplayMath(`\\text{A force }F(t)=${a}t+${b}\\,\\mathrm{N}\\text{ acts from }t=0\\text{ to }t=${t}\\,\\mathrm{s}.\\ \\text{Find the impulse.}`),
            s: withDisplayMath(`J=\\int_0^{${t}}(${a}t+${b})\\,dt=${dec((a * t * t) / 2 + b * t)}\\,\\mathrm{N\\,s}`),
            tag: "Variable impulse"
          };
        },
        () => {
          const m = randInt(1, 5);
          const vi = randInt(2, 8);
          const vf = -randInt(1, 6);
          return {
            q: withDisplayMath(`\\text{A body of mass }m=${m}\\,\\mathrm{kg}\\text{ changes velocity from }${vi}\\text{ to }${vf}\\,\\mathrm{m/s}.\\ \\text{Find }\\Delta p\\text{.}`),
            s: withDisplayMath(`\\Delta p=m(v_f-v_i)=${m}(${vf}-${vi})=${m * (vf - vi)}\\,\\mathrm{kg\\,m/s}`),
            tag: "Momentum change"
          };
        },
        () => {
          const m1 = randInt(1, 4);
          const m2 = randInt(1, 4);
          const v1 = randInt(2, 8);
          return {
            q: withDisplayMath(`\\text{A system initially at rest explodes into two fragments of masses }${m1}\\,\\mathrm{kg}\\text{ and }${m2}\\,\\mathrm{kg}.\\ \\text{If the first fragment has speed }${v1}\\,\\mathrm{m/s},\\ \\text{find the speed of the second fragment.}`),
            s: withDisplayMath(`m_1v_1+m_2v_2=0\\Rightarrow v_2=-\\frac{${m1}}{${m2}}\\cdot${v1}=${dec(-(m1 * v1) / m2)}\\,\\mathrm{m/s}`),
            tag: "Explosion"
          };
        },
        () => {
          const m1 = randInt(1, 5);
          const x1 = randInt(-5, 2);
          const m2 = randInt(1, 5);
          const x2 = randInt(3, 9);
          return {
            q: withDisplayMath(`\\text{Two masses }m_1=${m1}\\,\\mathrm{kg},\\ m_2=${m2}\\,\\mathrm{kg}\\text{ lie at }x_1=${x1}\\,\\mathrm{m},\\ x_2=${x2}\\,\\mathrm{m}.\\ \\text{Find }x_{cm}\\text{.}`),
            s: withDisplayMath(`x_{cm}=\\frac{${m1 * x1 + m2 * x2}}{${m1 + m2}}=${dec((m1 * x1 + m2 * x2) / (m1 + m2))}\\,\\mathrm{m}`),
            tag: "Center of mass"
          };
        },
        () => {
          const e = choice([0.2, 0.4, 0.6, 0.8]);
          const u1 = randInt(4, 12);
          const u2 = randInt(-2, 2);
          const v2 = randInt(2, 10);
          return {
            q: withDisplayMath(`\\text{In a one-dimensional collision, the pre-impact speeds are }u_1=${u1}\\text{ and }u_2=${u2}\\,\\mathrm{m/s},\\text{ while after impact }v_2=${v2}\\,\\mathrm{m/s}.\\ \\text{If }e=${e},\\ \\text{find }v_1\\text{.}`),
            s: withDisplayMath(`e=\\frac{v_2-v_1}{u_1-u_2}\\Rightarrow v_1=v_2-e(u_1-u_2)=${dec(v2 - e * (u1 - u2))}\\,\\mathrm{m/s}`),
            tag: "Restitution"
          };
        },
        () => {
          const u1 = randInt(4, 10);
          return {
            q: withDisplayMath(`\\text{Two equal masses undergo a head-on elastic collision. Initially }u_1=${u1}\\,\\mathrm{m/s},\\ u_2=0.\\ \\text{Find the final speeds.}`),
            s: withDisplayMath(`v_1'=0,\\quad v_2'=${u1}\\,\\mathrm{m/s}`),
            tag: "Elastic collision"
          };
        }
      ];
      return buildPool(() => choice(factories)(), 160);
    }

    function thermoTemplates(level = "medium") {
      if (level === "easy") {
        const factories = [
          () => {
            const n = randInt(1, 4);
            const T = randInt(260, 420);
            return {
              q: withDisplayMath(`\\text{An ideal gas has }n=${n}\\,\\mathrm{mol}\\text{ and }T=${T}\\,\\mathrm{K}.\\ \\text{Using }R=8.31,\\ \\text{find }pV\\text{.}`),
              s: withDisplayMath(`pV=nRT=${n}\\cdot8.31\\cdot${T}=${dec(n * 8.31 * T)}\\,\\mathrm{J}`),
              tag: "Ideal gas"
            };
          },
          () => {
            const c = randInt(-20, 80);
            return {
              q: withDisplayMath(`\\text{Convert }${c}^{\\circ}\\mathrm{C}\\text{ to kelvin.}`),
              s: withDisplayMath(`T=${c}+273.15=${dec(c + 273.15)}\\,\\mathrm{K}`),
              tag: "Temperature"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{State the first law of thermodynamics.}`),
            s: withDisplayMath(`\\Delta U=Q-W`),
            tag: "First law"
          }),
          () => ({
            q: withDisplayMath(`\\text{For an isochoric process, what is the work done by the gas?}`),
            s: withDisplayMath(`W=0`),
            tag: "Isochoric process"
          }),
          () => ({
              q: withDisplayMath(`\\text{For an isothermal transformation of an ideal gas, what is }\\Delta U\\text{?}`),
            s: withDisplayMath(`\\Delta U=0`),
            tag: "Isothermal process"
          }),
          () => {
            const m = randInt(1, 5);
            const c = choice([3900, 4200, 4500]);
            const deltaT = randInt(5, 30);
            return {
              q: withDisplayMath(`\\text{A sample of mass }m=${m}\\,\\mathrm{kg}\\text{ has specific heat }c=${c}\\,\\mathrm{J/(kg\\,K)}\\text{ and is heated by }\\Delta T=${deltaT}\\,\\mathrm{K}.\\ \\text{Find the heat absorbed.}`),
              s: withDisplayMath(`Q=mc\\Delta T=${m}\\cdot${c}\\cdot${deltaT}=${m * c * deltaT}\\,\\mathrm{J}`),
              tag: "Calorimetry"
            };
          },
          () => {
            const qh = randInt(400, 900);
            const qc = randInt(100, qh - 100);
            return {
              q: withDisplayMath(`\\text{A heat engine absorbs }Q_H=${qh}\\,\\mathrm{J}\\text{ and rejects }Q_C=${qc}\\,\\mathrm{J}.\\ \\text{Find the efficiency.}`),
              s: withDisplayMath(`\\eta=\\frac{Q_H-Q_C}{Q_H}=\\frac{${qh - qc}}{${qh}}=${dec((qh - qc) / qh)}`),
              tag: "Heat engine"
            };
          },
          () => {
            const T1 = randInt(250, 350);
            const T2 = T1 + randInt(20, 120);
            return {
              q: withDisplayMath(`\\text{At constant volume, an ideal gas goes from }T_1=${T1}\\,\\mathrm{K}\\text{ to }T_2=${T2}\\,\\mathrm{K}.\\ \\text{Find }p_2/p_1\\text{.}`),
              s: withDisplayMath(`\\frac{p_2}{p_1}=\\frac{T_2}{T_1}=\\frac{${T2}}{${T1}}=${dec(T2 / T1)}`),
              tag: "Gas laws"
            };
          }
        ];
        return buildPool(() => choice(factories)(), 150);
      }

      if (level === "hard") {
        const factories = [
          () => {
            const n = randInt(1, 4);
            const T = randInt(280, 360);
            const V1 = randInt(2, 5) / 100;
            const V2 = V1 + randInt(1, 5) / 100;
            return {
              q: withDisplayMath(`\\text{An ideal gas expands reversibly and isothermally with }n=${n}\\,\\mathrm{mol},\\ T=${T}\\,\\mathrm{K},\\ V_1=${V1}\\,\\mathrm{m^3},\\ V_2=${V2}\\,\\mathrm{m^3}.\\ \\text{Find the work done by the gas.}`),
              s: withDisplayMath(`W=nRT\\ln\\frac{V_2}{V_1}=${n}\\cdot8.31\\cdot${T}\\ln\\frac{${V2}}{${V1}}=${dec(n * 8.31 * T * Math.log(V2 / V1))}\\,\\mathrm{J}`),
              tag: "Isothermal work"
            };
          },
          () => {
            const n = randInt(1, 3);
            const V1 = randInt(2, 5) / 100;
            const V2 = V1 + randInt(1, 5) / 100;
            return {
              q: withDisplayMath(`\\text{For a reversible isothermal expansion of }n=${n}\\,\\mathrm{mol}\\text{ from }V_1=${V1}\\text{ to }V_2=${V2}\\,\\mathrm{m^3},\\ \\text{write the entropy change.}`),
              s: withDisplayMath(`\\Delta S=nR\\ln\\frac{V_2}{V_1}=${n}\\cdot8.31\\ln\\frac{${V2}}{${V1}}`),
              tag: "Entropy"
            };
          },
          () => {
            const qc = randInt(100, 400);
            const w = randInt(50, 150);
            return {
              q: withDisplayMath(`\\text{A refrigerator extracts }Q_C=${qc}\\,\\mathrm{J}\\text{ while consuming }W=${w}\\,\\mathrm{J}.\\ \\text{Find the coefficient of performance.}`),
              s: withDisplayMath(`COP=\\frac{Q_C}{W}=\\frac{${qc}}{${w}}=${dec(qc / w)}`),
              tag: "Refrigerator"
            };
          },
          () => {
            const qh = randInt(500, 1200);
            const qc = randInt(100, qh - 100);
            return {
              q: withDisplayMath(`\\text{A thermal cycle absorbs }Q_H=${qh}\\,\\mathrm{J}\\text{ and rejects }Q_C=${qc}\\,\\mathrm{J}.\\ \\text{Find the net work and the efficiency.}`),
              s: withDisplayMath(`W=Q_H-Q_C=${qh - qc}\\,\\mathrm{J},\\quad \\eta=\\frac{${qh - qc}}{${qh}}=${dec((qh - qc) / qh)}`),
              tag: "Thermal cycle"
            };
          },
          () => {
            const n = randInt(1, 4);
            const dT = randInt(20, 80);
            return {
              q: withDisplayMath(`\\text{A monoatomic ideal gas with }n=${n}\\,\\mathrm{mol}\\text{ is heated by }\\Delta T=${dT}\\,\\mathrm{K}.\\ \\text{Find }\\Delta U\\text{.}`),
              s: withDisplayMath(`\\Delta U=\\frac32 nR\\Delta T=\\frac32\\cdot${n}\\cdot8.31\\cdot${dT}=${dec(1.5 * n * 8.31 * dT)}\\,\\mathrm{J}`),
              tag: "Internal energy"
            };
          },
          () => {
            const qh = randInt(500, 1200);
            const Th = randInt(500, 900);
            const Tc = randInt(250, Th - 100);
            const eta = 1 - Tc / Th;
            return {
              q: withDisplayMath(`\\text{A Carnot engine works between }T_H=${Th}\\,\\mathrm{K}\\text{ and }T_C=${Tc}\\,\\mathrm{K}.\\ \\text{If it absorbs }Q_H=${qh}\\,\\mathrm{J},\\ \\text{find the work output.}`),
              s: withDisplayMath(`\\eta_C=1-\\frac{T_C}{T_H}=1-\\frac{${Tc}}{${Th}}=${dec(eta)},\\quad W=\\eta_CQ_H=${dec(eta * qh)}\\,\\mathrm{J}`),
              tag: "Carnot cycle"
            };
          },
          () => {
            const p = randInt(1, 4) * 1e5;
            const V = randInt(2, 8) / 100;
            const T = randInt(280, 360);
            return {
              q: withDisplayMath(`\\text{An ideal gas is at }p=${p}\\,\\mathrm{Pa},\\ V=${V}\\,\\mathrm{m^3},\\ T=${T}\\,\\mathrm{K}.\\ \\text{Find the amount of substance }n.}`),
              s: withDisplayMath(`n=\\frac{pV}{RT}=\\frac{${p}\\cdot${V}}{8.31\\cdot${T}}=${dec((p * V) / (8.31 * T))}\\,\\mathrm{mol}`),
              tag: "Ideal gas"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{State the adiabatic relation for an ideal gas.}`),
            s: withDisplayMath(`pV^{\\gamma}=\\text{constant}`),
            tag: "Adiabatic process"
          })
        ];
        return buildPool(() => choice(factories)(), 170);
      }

      const factories = [
        () => {
          const n = randInt(1, 4);
          const T = randInt(280, 380);
          const V = randInt(2, 8) / 100;
          return {
            q: withDisplayMath(`\\text{An ideal gas has }n=${n}\\,\\mathrm{mol},\\ T=${T}\\,\\mathrm{K},\\ V=${V}\\,\\mathrm{m^3}.\\ \\text{Find the pressure.}`),
            s: withDisplayMath(`p=\\frac{nRT}{V}=\\frac{${n}\\cdot8.31\\cdot${T}}{${V}}=${dec((n * 8.31 * T) / V)}\\,\\mathrm{Pa}`),
            tag: "Ideal gas"
          };
        },
        () => {
          const p = randInt(1, 4) * 1e5;
          const V1 = randInt(2, 6) / 100;
          const V2 = V1 + randInt(1, 5) / 100;
          return {
            q: withDisplayMath(`\\text{An ideal gas expands isobarically at }p=${p}\\,\\mathrm{Pa}\\text{ from }V_1=${V1}\\text{ to }V_2=${V2}\\,\\mathrm{m^3}.\\ \\text{Find the work.}`),
            s: withDisplayMath(`W=p(V_2-V_1)=${p}(${V2}-${V1})=${dec(p * (V2 - V1))}\\,\\mathrm{J}`),
            tag: "Isobaric work"
          };
        },
        () => {
          const n = randInt(1, 4);
          const dT = randInt(20, 80);
          return {
            q: withDisplayMath(`\\text{A monoatomic ideal gas with }n=${n}\\,\\mathrm{mol}\\text{ undergoes }\\Delta T=${dT}\\,\\mathrm{K}.\\ \\text{Find the internal-energy change.}`),
            s: withDisplayMath(`\\Delta U=\\frac32 nR\\Delta T=${dec(1.5 * n * 8.31 * dT)}\\,\\mathrm{J}`),
            tag: "Internal energy"
          };
        },
        () => {
          const T1 = randInt(250, 340);
          const T2 = T1 + randInt(30, 100);
          return {
            q: withDisplayMath(`\\text{At constant volume, an ideal gas goes from }T_1=${T1}\\,\\mathrm{K}\\text{ to }T_2=${T2}\\,\\mathrm{K}.\\ \\text{Find }p_2/p_1\\text{.}`),
            s: withDisplayMath(`\\frac{p_2}{p_1}=\\frac{T_2}{T_1}=\\frac{${T2}}{${T1}}=${dec(T2 / T1)}`),
            tag: "Gas laws"
          };
        },
        () => {
          const Th = randInt(450, 800);
          const Tc = randInt(250, Th - 50);
          return {
            q: withDisplayMath(`\\text{A Carnot engine works between }T_H=${Th}\\,\\mathrm{K}\\text{ and }T_C=${Tc}\\,\\mathrm{K}.\\ \\text{Find the efficiency.}`),
            s: withDisplayMath(`\\eta_C=1-\\frac{T_C}{T_H}=1-\\frac{${Tc}}{${Th}}=${dec(1 - Tc / Th)}`),
            tag: "Carnot cycle"
          };
        },
        () => {
          const n = randInt(1, 4);
          const Cv = choice([12.5, 20.8, 29.1]);
          const dT = randInt(20, 80);
          return {
            q: withDisplayMath(`\\text{A gas with }n=${n}\\,\\mathrm{mol}\\text{ and molar heat capacity }C_V=${Cv}\\,\\mathrm{J/(mol\\,K)}\\text{ is heated at constant volume by }\\Delta T=${dT}\\,\\mathrm{K}.\\ \\text{Find }Q\\text{.}`),
            s: withDisplayMath(`Q=nC_V\\Delta T=${n}\\cdot${Cv}\\cdot${dT}=${dec(n * Cv * dT)}\\,\\mathrm{J}`),
            tag: "Heat capacity"
          };
        },
        () => {
          const T1 = randInt(280, 340);
          const T2 = T1 + randInt(40, 120);
          return {
            q: withDisplayMath(`\\text{At constant pressure, an ideal gas goes from }T_1=${T1}\\,\\mathrm{K}\\text{ to }T_2=${T2}\\,\\mathrm{K}.\\ \\text{Find }V_2/V_1\\text{.}`),
            s: withDisplayMath(`\\frac{V_2}{V_1}=\\frac{T_2}{T_1}=\\frac{${T2}}{${T1}}=${dec(T2 / T1)}`),
            tag: "Gas laws"
          };
        },
        () => {
          const p = randInt(1, 3) * 1e5;
          const V = randInt(2, 8) / 100;
          const T = randInt(280, 360);
          return {
            q: withDisplayMath(`\\text{An ideal gas is at }p=${p}\\,\\mathrm{Pa},\\ V=${V}\\,\\mathrm{m^3},\\ T=${T}\\,\\mathrm{K}.\\ \\text{Find the amount of substance.}`),
            s: withDisplayMath(`n=\\frac{pV}{RT}=\\frac{${p}\\cdot${V}}{8.31\\cdot${T}}=${dec((p * V) / (8.31 * T))}\\,\\mathrm{mol}`),
            tag: "Ideal gas"
          };
        }
      ];
      return buildPool(() => choice(factories)(), 160);
    }


    function generatorForTopic(topic, level) {
      switch (topic) {
        case "kinematics": return kinematicsTemplates(level);
        case "dynamics": return dynamicsTemplates(level);
        case "momentum": return momentumTemplates(level);
        case "thermo": return thermoTemplates(level);
        default: return [];
      }
    }

    function buildExercises(topic, count, level) {
      return sampleExercises(generatorForTopic(topic, level), count);
    }

    function buildExamSheet(level) {
      const topics = ["kinematics", "dynamics", "momentum", "thermo"];
      return shuffle(topics.map((topic, i) => {
        const ex = choice(generatorForTopic(topic, level));
        return { index: i + 1, ...ex, examTopic: topic };
      })).map((ex, index) => ({ ...ex, index: index + 1 }));
    }

    let currentTopic = "kinematics";
    let solutionsVisible = false;
    let currentExercises = [];

    function labelForTopic(topic) {
      switch (topic) {
        case "kinematics": return "Kinematics";
        case "dynamics": return "Dynamics & Energy";
        case "momentum": return "Momentum & Collisions";
        case "thermo": return "Thermodynamics";
        case "exam": return "Exam Mode";
        default: return "Worksheet";
      }
    }

    function defaultTitleForTopic(topic) {
      switch (topic) {
        case "kinematics": return "Kinematics Worksheet";
        case "dynamics": return "Dynamics and Energy Worksheet";
        case "momentum": return "Momentum and Collisions Worksheet";
        case "thermo": return "Thermodynamics Worksheet";
        case "exam": return "Physics I Exam Practice";
        default: return "Physics I Worksheet";
      }
    }

    function updateTopicButtons() {
      document.querySelectorAll("#topicNav button").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.topic === currentTopic);
      });
    }

    function updatePills() {
      const level = document.getElementById("level").value;
      document.getElementById("levelPill").textContent = level.toUpperCase();
      document.getElementById("solutionsPill").textContent = solutionsVisible ? "VISIBLE" : "HIDDEN";
    }

    async function typesetMath(elements) {
      if (window.MathJax && window.MathJax.typesetPromise) {
        await window.MathJax.typesetPromise(elements);
      }
    }

    async function renderLists() {
      const exerciseList = document.getElementById("exerciseList");
      const solutionList = document.getElementById("solutionList");
      const solutionsCard = document.getElementById("solutionsCard");

      exerciseList.innerHTML = "";
      solutionList.innerHTML = "";

      currentExercises.forEach((ex) => {
        const tag = ex.examTopic ? labelForTopic(ex.examTopic).toUpperCase() : ex.tag;

        const exEl = document.createElement("div");
        exEl.className = "exercise";
        exEl.innerHTML = `
          <div class="exercise-head">
            <div class="exercise-number">Exercise ${ex.index}</div>
            <div class="tag">${tag}</div>
          </div>
          <div class="math">${ex.q}</div>
        `;
        exerciseList.appendChild(exEl);

        const solEl = document.createElement("div");
        solEl.className = "exercise";
        solEl.innerHTML = `
          <div class="exercise-head">
            <div class="exercise-number">Solution ${ex.index}</div>
            <div class="tag">${tag}</div>
          </div>
          <div class="math">${ex.s}</div>
        `;
        solutionList.appendChild(solEl);
      });

      solutionsCard.classList.toggle("hidden", !solutionsVisible);
      updatePills();
      await typesetMath([exerciseList, solutionList]);
    }

    async function generateWorksheet() {
      const titleInput = document.getElementById("title");
      const countInput = document.getElementById("count");
      const levelSelect = document.getElementById("level");
      const previewTitle = document.getElementById("previewTitle");
      const status = document.getElementById("status");

      const count = Math.max(1, Math.min(50, Number(countInput.value) || 10));
      countInput.value = count;

      const level = levelSelect.value;
      const title = titleInput.value.trim() || defaultTitleForTopic(currentTopic);
      previewTitle.textContent = title;

      currentExercises = currentTopic === "exam"
        ? buildExamSheet(level)
        : buildExercises(currentTopic, count, level);

      await renderLists();
      status.textContent = currentTopic === "exam"
        ? `Generated ${currentExercises.length} exam exercises.`
        : `Generated ${currentExercises.length} exercises.`;
    }

    async function setTopic(topic) {
      currentTopic = topic;
      const titleInput = document.getElementById("title");
      const countWrap = document.getElementById("countWrap");
      const status = document.getElementById("status");

      titleInput.value = defaultTitleForTopic(topic);
      countWrap.classList.toggle("hidden", topic === "exam");
      updateTopicButtons();
      solutionsVisible = false;
      document.getElementById("toggleSolutionsBtn").textContent = "Show solutions";
      status.textContent = "Ready.";

      await generateWorksheet();
    }

    function buildPdfMarkup() {
      const title = document.getElementById("previewTitle").textContent || "Worksheet";
      const level = document.getElementById("level").value.toUpperCase();
      const pdfLevel = withDisplayMath(`\\text{Difficulty: } ${latexText(level)}`);
      const pdfExercises = withDisplayMath(`\\text{Exercises}`);
      const pdfSolutions = withDisplayMath(`\\text{Solutions}`);

      const exerciseHtml = currentExercises.map((ex) => {
        const tag = ex.examTopic ? labelForTopic(ex.examTopic).toUpperCase() : ex.tag;
        return `
          <div class="pdf-exercise">
            <div class="pdf-head">
              <div class="pdf-num">Exercise ${ex.index}</div>
              <div class="pdf-tag">${tag}</div>
            </div>
            <div class="pdf-math">${ex.q}</div>
          </div>
        `;
      }).join("");

      const solutionHtml = currentExercises.map((ex) => {
        const tag = ex.examTopic ? labelForTopic(ex.examTopic).toUpperCase() : ex.tag;
        return `
          <div class="pdf-exercise">
            <div class="pdf-head">
              <div class="pdf-num">Solution ${ex.index}</div>
              <div class="pdf-tag">${tag}</div>
            </div>
            <div class="pdf-math">${ex.s}</div>
          </div>
        `;
      }).join("");

      return `
        <div class="pdf-page">
          <div class="pdf-title">${title}</div>
          <div class="pdf-meta">${pdfLevel}</div>
          <div class="pdf-section-title">${pdfExercises}</div>
          ${exerciseHtml}
        </div>
        ${solutionsVisible ? `
        <div class="pdf-page">
          <div class="pdf-title">${title}</div>
          <div class="pdf-meta">${pdfSolutions}</div>
          <div class="pdf-section-title">${pdfSolutions}</div>
          ${solutionHtml}
        </div>` : ""}
      `;
    }

    async function downloadPdf() {
      const status = document.getElementById("status");
      const title = document.getElementById("previewTitle").textContent || "worksheet";

      try {
        if (!window.LatexPdfExport || !window.LatexPdfExport.exportWorksheet) {
          throw new Error("LaTeX PDF export helper not loaded.");
        }

        status.textContent = "Compiling LaTeX PDF...";

        const exercises = currentExercises.map((ex, index) => {
          const tag = ex.examTopic
            ? (typeof labelForTopic === "function"
                ? labelForTopic(ex.examTopic)
                : window.LatexPdfExport.humanizeSlug(ex.examTopic))
            : ex.tag;

          return {
            index: ex.index ?? index + 1,
            tag,
            q: ex.q,
            s: ex.s
          };
        });

        await window.LatexPdfExport.exportWorksheet({
          title,
          subject: document.title || "Worksheet",
          difficulty: document.getElementById("level").value.toUpperCase(),
          includeSolutions: solutionsVisible,
          exercises
        });

        status.textContent = "LaTeX PDF downloaded successfully.";
      } catch (err) {
        status.textContent = err?.message || "LaTeX PDF generation failed.";
        console.error(err);
      }
    }

    document.getElementById("generateBtn").addEventListener("click", generateWorksheet);
    document.getElementById("toggleSolutionsBtn").addEventListener("click", async () => {
      solutionsVisible = !solutionsVisible;
      document.getElementById("toggleSolutionsBtn").textContent = solutionsVisible ? "Hide solutions" : "Show solutions";
      await renderLists();
    });
    document.getElementById("downloadBtn").addEventListener("click", downloadPdf);
    document.getElementById("level").addEventListener("change", async () => {
      updatePills();
      await generateWorksheet();
    });

    document.querySelectorAll("#topicNav button").forEach((btn) => {
      btn.addEventListener("click", () => setTopic(btn.dataset.topic));
    });

    setTopic("kinematics");
  </script>

    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const choice = (arr) => arr[Math.floor(Math.random() * arr.length)];

    function withDisplayMath(latex) {
      return `\\[${latex}\\]`;
    }

    function latexText(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/%/g, "\\%")
        .replace(/_/g, "\\_")
        .replace(/&/g, "\\&")
        .replace(/#/g, "\\#");
    }

    function dec(num, digits = 2) {
      return Number(num.toFixed(digits));
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildPool(factory, size = 100) {
      const seen = new Set();
      const out = [];
      let attempts = 0;
      while (out.length < size && attempts < size * 50) {
        attempts += 1;
        const ex = factory();
        const key = `${ex.q}=>${ex.s}`;
        if (seen.has(key)) continue;
        seen.add(key);
        out.push(ex);
      }
      return shuffle(out);
    }

    function sampleExercises(pool, count) {
      if (!Array.isArray(pool) || pool.length === 0) return [];
      const out = [];
      while (out.length < count) {
        for (const ex of shuffle(pool)) {
          out.push(ex);
          if (out.length >= count) break;
        }
      }
      return out.slice(0, count).map((ex, index) => ({
        index: index + 1,
        q: ex.q,
        s: ex.s,
        tag: ex.tag,
        examTopic: ex.examTopic
      }));
    }

    function electrostaticsTemplates(level = "medium") {
      if (level === "easy") {
        return buildPool(() => {
          const q = randInt(1, 8);
          const E = randInt(50, 400);
          const type = randInt(1, 8);
          switch (type) {
            case 1:
              return { q: withDisplayMath(`\\text{Using Coulomb's law, write the magnitude of the force between two point charges }q_1,q_2\\text{ at distance }r.`), s: withDisplayMath(`F = k\\frac{|q_1 q_2|}{r^2}`), tag: "Coulomb law" };
            case 2:
              return { q: withDisplayMath(`\\text{A charge }q=${q}\\,\\mu\\mathrm{C}\\text{ is placed in a uniform electric field }E=${E}\\,\\mathrm{N/C}.\\ \\text{Find the magnitude of the force.}`), s: withDisplayMath(`F=qE=${q}\\times10^{-6}\\cdot${E}=${dec(q*1e-6*E,6)}\\,\\mathrm{N}`), tag: "Electric force" };
            case 3:
              return { q: withDisplayMath(`\\text{State Gauss's law in integral form.}`), s: withDisplayMath(`\\oint \\vec E\\cdot d\\vec A = \\frac{Q_{\\text{int}}}{\\varepsilon_0}`), tag: "Gauss law" };
            case 4:
              return { q: withDisplayMath(`\\text{What is the electric field inside a conductor in electrostatic equilibrium?}`), s: withDisplayMath(`\\vec E = 0`), tag: "Conductors" };
            case 5:
              return { q: withDisplayMath(`\\text{Write the electric field magnitude of a point charge }q\\text{ at distance }r.`), s: withDisplayMath(`E = k\\frac{|q|}{r^2}`), tag: "Point charge field" };
            case 6:
              return { q: withDisplayMath(`\\text{What is the flux of a uniform field }\\vec E\\text{ through a flat surface }A\\text{ perpendicular to the field?}`), s: withDisplayMath(`\\Phi_E = EA`), tag: "Electric flux" };
            case 7:
              return { q: withDisplayMath(`\\text{State the superposition principle for electric fields.}`), s: withDisplayMath(`\\vec E_{\\text{tot}} = \\sum_i \\vec E_i`), tag: "Superposition" };
            default:
              return { q: withDisplayMath(`\\text{A point charge produces field }E=${E}\\,\\mathrm{N/C}\\text{ at a point. Find the force on a }2\\,\\mu\\mathrm{C}\\text{ charge placed there.}`), s: withDisplayMath(`F=qE=2\\times10^{-6}\\cdot${E}=${dec(2e-6*E,6)}\\,\\mathrm{N}`), tag: "Electric force" };
          }
        }, 100);
      }

      if (level === "hard") {
        return buildPool(() => {
          const Q = randInt(1, 8);
          const type = randInt(1, 10);
          switch (type) {
            case 1:
              return { q: withDisplayMath(`\\text{Using Gauss's law, write the electric field outside a uniformly charged sphere of total charge }Q\\text{ at distance }r>R.`), s: withDisplayMath(`E(r)=\\frac{1}{4\\pi\\varepsilon_0}\\frac{Q}{r^2}`), tag: "Gauss sphere" };
            case 2:
              return { q: withDisplayMath(`\\text{Write the electric field magnitude of an infinite plane sheet with surface charge density }\\sigma.`), s: withDisplayMath(`E=\\frac{\\sigma}{2\\varepsilon_0}`), tag: "Infinite plane" };
            case 3:
              return { q: withDisplayMath(`\\text{Write the electric field magnitude at distance }r\\text{ from an infinite line charge with density }\\lambda.`), s: withDisplayMath(`E=\\frac{\\lambda}{2\\pi\\varepsilon_0 r}`), tag: "Line charge" };
            case 4:
              return { q: withDisplayMath(`\\text{What is the field inside a spherical conductor in electrostatic equilibrium?}`), s: withDisplayMath(`E=0`), tag: "Conductors" };
            case 5:
              return { q: withDisplayMath(`\\text{Two identical point charges }q\\text{ are at distance }2a.\\ \\text{What is the electric field at the midpoint?}`), s: withDisplayMath(`E=0`), tag: "Symmetry" };
            case 6:
              return { q: withDisplayMath(`\\text{A point charge }Q=${Q}\\,\\mu\\mathrm{C}\\text{ is enclosed by a spherical Gaussian surface. Write the total electric flux.}`), s: withDisplayMath(`\\Phi_E=\\frac{Q}{\\varepsilon_0}=\\frac{${Q}\\times10^{-6}}{\\varepsilon_0}`), tag: "Gauss flux" };
            case 7:
              return { q: withDisplayMath(`\\text{State the boundary condition for the tangential component of }\\vec E\\text{ across the surface of a conductor in electrostatics.}`), s: withDisplayMath(`E_t=0`), tag: "Boundary conditions" };
            case 8:
              return { q: withDisplayMath(`\\text{If a closed surface encloses zero net charge, what can be said about the total electric flux?}`), s: withDisplayMath(`\\Phi_E=0`), tag: "Gauss law" };
            case 9:
              return { q: withDisplayMath(`\\text{Write the field of a uniformly charged infinite plane conductor just outside the surface.}`), s: withDisplayMath(`E=\\frac{\\sigma}{\\varepsilon_0}`), tag: "Conducting plane" };
            default:
              return { q: withDisplayMath(`\\text{A point charge }Q\\text{ is at the center of a cube. What is the electric flux through one face?}`), s: withDisplayMath(`\\Phi_{\\text{face}}=\\frac{Q}{6\\varepsilon_0}`), tag: "Symmetry flux" };
          }
        }, 110);
      }

      return buildPool(() => {
        const E = randInt(80, 500);
        const q = randInt(1, 6);
        const type = randInt(1, 10);
        switch (type) {
