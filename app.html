  <script>
    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    const choice = (arr) => {
      if (!Array.isArray(arr) || arr.length === 0) {
        throw new Error("Cannot choose from an empty array.");
      }
      return arr[Math.floor(Math.random() * arr.length)];
    };

    function gcd(a, b) {
      a = Math.abs(a);
      b = Math.abs(b);
      while (b !== 0) {
        const t = b;
        b = a % b;
        a = t;
      }
      return a;
    }

    function frac(n, d) {
      if (d === 0) throw new Error("Denominator cannot be zero.");
      const sign = d < 0 ? -1 : 1;
      n *= sign;
      d *= sign;
      const g = gcd(n, d);
      return `\\frac{${n / g}}{${d / g}}`;
    }

    function formatCoeff(value) {
      if (Number.isInteger(value)) return String(value);
      const rounded = Number(value.toFixed(2));
      if (Number.isInteger(rounded)) return String(rounded);
      const denom = 100;
      const num = Math.round(rounded * denom);
      return frac(num, denom);
    }

    function withDisplayMath(latex) {
      return `\\[${latex}\\]`;
    }

    function latexText(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/%/g, "\\%")
        .replace(/_/g, "\\_")
        .replace(/&/g, "\\&")
        .replace(/#/g, "\\#");
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function sampleExercises(pool, count) {
      if (!Array.isArray(pool) || pool.length === 0) return [];
      const out = [];
      while (out.length < count) {
        const round = shuffle(pool);
        for (const ex of round) {
          out.push(ex);
          if (out.length >= count) break;
        }
      }
      return out.slice(0, count).map((ex, index) => ({
        index: index + 1,
        q: ex.q,
        s: ex.s,
        tag: ex.tag,
        examTopic: ex.examTopic
      }));
    }

    function buildPool(factory, size = 100) {
      const seen = new Set();
      const out = [];
      let attempts = 0;

      while (out.length < size && attempts < size * 40) {
        attempts += 1;
        const ex = factory();
        const key = `${ex.q}=>${ex.s}`;
        if (seen.has(key)) continue;
        seen.add(key);
        out.push(ex);
      }
      return shuffle(out);
    }

    function duplicateWithIndex(base, total) {
      return sampleExercises(base, total);
    }

    function integralTemplates(level = "medium") {
      if (level === "easy") {
        return buildPool(() => {
          const a = randInt(1, 8);
          const b = randInt(1, 10);
          const c = randInt(1, 5);
          const d = randInt(1, 8);
          const k = randInt(1, 8);
          const m = randInt(1, 5);
          const p = randInt(2, 7);
          const q = randInt(2, 6);
          const type = randInt(1, 8);

          switch (type) {
            case 1:
              return {
                q: withDisplayMath(`\\int (${a}x + ${b})\\,dx`),
                s: withDisplayMath(`${formatCoeff(a / 2)}x^2 + ${b}x + C`),
                tag: "Linear"
              };
            case 2:
              return {
                q: withDisplayMath(`\\int (${c}x^2 + ${d}x)\\,dx`),
                s: withDisplayMath(`${formatCoeff(c / 3)}x^3 + ${formatCoeff(d / 2)}x^2 + C`),
                tag: "Polynomial"
              };
            case 3:
              return {
                q: withDisplayMath(`\\int ${k}\\sin(x)\\,dx`),
                s: withDisplayMath(`${k === 1 ? "-" : "-" + k}\\cos(x) + C`),
                tag: "Trigonometric"
              };
            case 4:
              return {
                q: withDisplayMath(`\\int ${k}\\cos(x)\\,dx`),

    function limitTemplates(level = "medium") {
      if (level === "easy") {
        return duplicateWithIndex([
          { q: withDisplayMath(`\\lim_{x\\to 0}\\frac{\\sin(x)}{x}`), s: withDisplayMath(`1`), tag: "Notable limit" },

          { q: withDisplayMath(`\\lim_{x\\to 0}\\frac{\\ln(1+x)}{x}`), s: withDisplayMath(`1`), tag: "Notable limit" }

        { q: withDisplayMath(`\\lim_{x\\to \\infty}\\frac{2x^2+1}{x^2-3}`), s: withDisplayMath(`2`), tag: "Rational" },
        { q: withDisplayMath(`\\lim_{x\\to 0}\\frac{\\sqrt{1+x}-1}{x}`), s: withDisplayMath(`\\frac{1}{2}`), tag: "Algebraic" },

    function seriesTemplates(level = "medium") {
      if (level === "easy") {
        return duplicateWithIndex([
          { q: withDisplayMath(`\\text{Determine whether } \\sum \\frac{1}{n^2} \\text{ converges}`), s: withDisplayMath(`\\text{Convergent}`), tag: "p-series" },
          { q: withDisplayMath(`\\text{Determine whether } \\sum \\frac{1}{n} \\text{ converges}`), s: withDisplayMath(`\\text{Divergent}`), tag: "Harmonic" },

          { q: withDisplayMath(`\\text{Determine whether } \\sum \\frac{(-1)^n}{n^2} \\text{ converges}`), s: withDisplayMath(`\\text{Absolutely convergent}`), tag: "Absolute convergence" },
          { q: withDisplayMath(`\\text{Determine whether } \\sum \\frac{2^n}{n!} \\text{ converges}`), s: withDisplayMath(`\\text{Convergent}`), tag: "Ratio test" },
          { q: withDisplayMath(`\\text{Determine whether } \\sum \\frac{\\ln(n)}{n} \\text{ converges}`), s: withDisplayMath(`\\text{Divergent}`), tag: "Comparison/integral" }

    function generatorForTopic(topic, level) {
      switch (topic) {
        case "integrals": return integralTemplates(level);
        case "derivatives": return derivativeTemplates(level);
        case "limits": return limitTemplates(level);
        case "series": return seriesTemplates(level);
        default: return [];
      }
    }

    function buildExercises(topic, count, level) {
      const pool = generatorForTopic(topic, level);
      return sampleExercises(pool, count);
    }

    function buildExamSheet(level) {
      const topics = ["integrals", "derivatives", "limits", "series"];
      const chosen = topics.map((topic, i) => {
        const pool = generatorForTopic(topic, level);
        const ex = choice(pool);
        return { index: i + 1, ...ex, examTopic: topic };
      });
      return shuffle(chosen).map((ex, index) => ({ ...ex, index: index + 1 }));
    }

    let currentTopic = "integrals";
    let solutionsVisible = false;
    let currentExercises = [];

    function defaultTitleForTopic(topic) {
      switch (topic) {
        case "integrals": return "Integral Worksheet";
        case "derivatives": return "Derivative Worksheet";
        case "limits": return "Limits Worksheet";
        case "series": return "Series Worksheet";
        case "exam": return "Calculus I Exam Practice";
        default: return "Worksheet";
      }
    }

    function updateTopicButtons() {
      document.querySelectorAll("#topicNav button").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.topic === currentTopic);
      });
    }

    function updatePills() {
      const level = document.getElementById("level").value;
      document.getElementById("levelPill").textContent = level.toUpperCase();
      document.getElementById("solutionsPill").textContent = solutionsVisible ? "VISIBLE" : "HIDDEN";
    }

    async function typesetMath(elements) {
      if (window.MathJax && window.MathJax.typesetPromise) {
        await window.MathJax.typesetPromise(elements);
      }
    }

    async function renderLists() {
      const exerciseList = document.getElementById("exerciseList");
      const solutionList = document.getElementById("solutionList");
      const solutionsCard = document.getElementById("solutionsCard");

      exerciseList.innerHTML = "";
      solutionList.innerHTML = "";

      currentExercises.forEach((ex) => {
        const tag = ex.examTopic ? ex.examTopic.toUpperCase() : ex.tag;

        const exEl = document.createElement("div");
        exEl.className = "exercise";
        exEl.innerHTML = `
          <div class="exercise-head">
            <div class="exercise-number">Exercise ${ex.index}</div>
            <div class="tag">${tag}</div>
          </div>
          <div class="math">${ex.q}</div>
        `;
        exerciseList.appendChild(exEl);

        const solEl = document.createElement("div");
        solEl.className = "exercise";
        solEl.innerHTML = `
          <div class="exercise-head">
            <div class="exercise-number">Solution ${ex.index}</div>
            <div class="tag">${tag}</div>
          </div>
          <div class="math">${ex.s}</div>
        `;
        solutionList.appendChild(solEl);
      });

      solutionsCard.classList.toggle("hidden", !solutionsVisible);
      updatePills();
      await typesetMath([exerciseList, solutionList]);
    }

    async function generateWorksheet() {
      const titleInput = document.getElementById("title");
      const countInput = document.getElementById("count");
      const levelSelect = document.getElementById("level");
      const previewTitle = document.getElementById("previewTitle");
      const status = document.getElementById("status");

      const count = Math.max(1, Math.min(50, Number(countInput.value) || 10));
      countInput.value = count;

      const level = levelSelect.value;
      const title = titleInput.value.trim() || defaultTitleForTopic(currentTopic);

      previewTitle.textContent = title;

      currentExercises =
        currentTopic === "exam"
          ? buildExamSheet(level)
          : buildExercises(currentTopic, count, level);

      await renderLists();

      status.textContent =
        currentTopic === "exam"
          ? `Generated ${currentExercises.length} exam exercises.`
          : `Generated ${currentExercises.length} exercises.`;
    }

    async function setTopic(topic) {
      currentTopic = topic;

      const titleInput = document.getElementById("title");
      const countWrap = document.getElementById("countWrap");
      const status = document.getElementById("status");

      titleInput.value = defaultTitleForTopic(topic);
      countWrap.classList.toggle("hidden", topic === "exam");

      updateTopicButtons();
      solutionsVisible = false;
      document.getElementById("toggleSolutionsBtn").textContent = "Show solutions";
      status.textContent = "Ready.";

      await generateWorksheet();
    }

    function buildPdfMarkup() {
      const title = document.getElementById("previewTitle").textContent || "Worksheet";
      const level = document.getElementById("level").value.toUpperCase();
      const pdfLevel = withDisplayMath(`\\text{Difficulty: } ${latexText(level)}`);
      const pdfSolutions = withDisplayMath(`\\text{Solutions}`);
      const pdfExercises = withDisplayMath(`\\text{Exercises}`);

      const exerciseHtml = currentExercises.map((ex) => {
        const tag = ex.examTopic ? ex.examTopic.toUpperCase() : ex.tag;
        return `
          <div class="pdf-exercise">
            <div class="pdf-head">
              <div class="pdf-num">Exercise ${ex.index}</div>
              <div class="pdf-tag">${tag}</div>
            </div>
            <div class="pdf-math">${ex.q}</div>
          </div>
        `;
      }).join("");

      const solutionHtml = currentExercises.map((ex) => {
        const tag = ex.examTopic ? ex.examTopic.toUpperCase() : ex.tag;
        return `
          <div class="pdf-exercise">
            <div class="pdf-head">
              <div class="pdf-num">Solution ${ex.index}</div>
              <div class="pdf-tag">${tag}</div>
            </div>
            <div class="pdf-math">${ex.s}</div>
          </div>
        `;
      }).join("");

      return `
        <div class="pdf-page">
          <div class="pdf-title">${title}</div>
          <div class="pdf-meta">${pdfLevel}</div>
          <div class="pdf-section-title">${pdfExercises}</div>
          ${exerciseHtml}
        </div>
        ${solutionsVisible ? `
        <div class="pdf-page">
          <div class="pdf-title">${title}</div>
          <div class="pdf-meta">${pdfSolutions}</div>
          <div class="pdf-section-title">${pdfSolutions}</div>
          ${solutionHtml}
        </div>` : ""}
      `;
    }

    async function downloadPdf() {
      const status = document.getElementById("status");
      const title = document.getElementById("previewTitle").textContent || "worksheet";

      try {
        if (!window.LatexPdfExport || !window.LatexPdfExport.exportWorksheet) {
          throw new Error("LaTeX PDF export helper not loaded.");
        }

        status.textContent = "Compiling LaTeX PDF...";

        const exercises = currentExercises.map((ex, index) => {
          const tag = ex.examTopic
            ? (typeof labelForTopic === "function"
                ? labelForTopic(ex.examTopic)
                : window.LatexPdfExport.humanizeSlug(ex.examTopic))
            : ex.tag;

          return {
            index: ex.index ?? index + 1,
            tag,
            q: ex.q,
            s: ex.s
          };
        });

        await window.LatexPdfExport.exportWorksheet({
          title,
          subject: document.title || "Worksheet",
          difficulty: document.getElementById("level").value.toUpperCase(),
          includeSolutions: solutionsVisible,
          exercises
        });

        status.textContent = "LaTeX PDF downloaded successfully.";
      } catch (err) {
        status.textContent = err?.message || "LaTeX PDF generation failed.";
        console.error(err);
      }
    }

    document.getElementById("generateBtn").addEventListener("click", generateWorksheet);

    document.getElementById("toggleSolutionsBtn").addEventListener("click", async () => {
      solutionsVisible = !solutionsVisible;
      document.getElementById("toggleSolutionsBtn").textContent =
        solutionsVisible ? "Hide solutions" : "Show solutions";
      await renderLists();
    });

    document.getElementById("downloadBtn").addEventListener("click", downloadPdf);
    document.getElementById("level").addEventListener("change", async () => {
      updatePills();
      await generateWorksheet();
    });

    document.querySelectorAll("#topicNav button").forEach((btn) => {
      btn.addEventListener("click", () => setTopic(btn.dataset.topic));
    });

    setTopic("integrals");
  </script>

  <script>
    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    const choice = (arr) => {
      if (!Array.isArray(arr) || arr.length === 0) {
        throw new Error("Cannot choose from an empty array.");
      }
      return arr[Math.floor(Math.random() * arr.length)];
    };

    function gcd(a, b) {
      a = Math.abs(a);
      b = Math.abs(b);
      while (b !== 0) {
        const t = b;
        b = a % b;
        a = t;
      }
      return a;
    }

    function frac(n, d) {
      if (d === 0) throw new Error("Denominator cannot be zero.");
      const sign = d < 0 ? -1 : 1;
      n *= sign;
      d *= sign;
      const g = gcd(n, d);
      return `\\frac{${n / g}}{${d / g}}`;
    }

    function withDisplayMath(latex) {
      return `\\[${latex}\\]`;
    }

    function latexText(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/%/g, "\\%")
        .replace(/_/g, "\\_")
        .replace(/&/g, "\\&")
        .replace(/#/g, "\\#");
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function sampleExercises(pool, count) {
      if (!Array.isArray(pool) || pool.length === 0) return [];
      const out = [];
      while (out.length < count) {
        const round = shuffle(pool);
        for (const ex of round) {
          out.push(ex);
          if (out.length >= count) break;
        }
      }
      return out.slice(0, count).map((ex, index) => ({
        index: index + 1,
        q: ex.q,
        s: ex.s,
        tag: ex.tag,
        examTopic: ex.examTopic
      }));
    }

    function buildPool(factory, size = 120) {
      const seen = new Set();
      const out = [];
      let attempts = 0;

      while (out.length < size && attempts < size * 45) {
        attempts += 1;
        const ex = factory();
        const key = `${ex.q}=>${ex.s}`;
        if (seen.has(key)) continue;
        seen.add(key);
        out.push(ex);
      }
      return shuffle(out);
    }

    function multivariableLimitTemplates(level = "medium") {
      if (level === "easy") {
        return buildPool(() => {
          const a = randInt(1, 5);
          const b = randInt(1, 5);
          const c = randInt(1, 4);
          const type = randInt(1, 8);

          switch (type) {
            case 1:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{x^2+y^2}{\\sqrt{x^2+y^2}}`),
                s: withDisplayMath(`0`),
                tag: "Polar coordinates"
              };
            case 2:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{x^2y^2}{x^2+y^2}`),
                s: withDisplayMath(`0`),
                tag: "Squeeze theorem"
              };
            case 3:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{${a}xy}{x^2+y^2}`),
                s: withDisplayMath(`\\text{Does not exist}`),
                tag: "Path dependence"
              };
            case 4:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{x^2y}{x^2+y^2}`),
                s: withDisplayMath(`0`),
                tag: "Polar coordinates"
              };
            case 5:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{x^2+y^2}{${b}+x^2+y^2}`),
                s: withDisplayMath(`0`),
                tag: "Continuity"
              };
            case 6:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{x^4+y^4}{x^2+y^2}`),
                s: withDisplayMath(`0`),
                tag: "Degree comparison"
              };
            case 7:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{\\sin(x^2+y^2)}{x^2+y^2}`),
                s: withDisplayMath(`1`),
                tag: "Notable limit"
              };
            default:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{x^2-${c}y^2}{x^2+y^2}`),
                s: withDisplayMath(`\\text{Does not exist}`),
                tag: "Path dependence"
              };
          }
        }, 120);
      }

      if (level === "hard") {
        return buildPool(() => {
          const a = randInt(1, 5);
          const b = randInt(2, 6);
          const type = randInt(1, 10);

          switch (type) {
            case 1:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{x^2y^2}{(x^2+y^2)^{3/2}}`),
                s: withDisplayMath(`0`),
                tag: "Polar coordinates"
              };
            case 2:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{x^3-y^3}{x^2+y^2}`),
                s: withDisplayMath(`0`),
                tag: "Order estimate"
              };
            case 3:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{x^2y}{x^4+y^2}`),
                s: withDisplayMath(`\\text{Does not exist}`),
                tag: "Curved path"
              };
            case 4:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{x^{${b}}+y^{${b}}}{\\sqrt{x^2+y^2}}`),
                s: withDisplayMath(`0`),
                tag: "Degree comparison"
              };
            case 5:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{x^2-y^2}{\\sqrt{x^2+y^2}}`),
                s: withDisplayMath(`0`),
                tag: "Polar coordinates"
              };
            case 6:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{x^4+a y^4}{x^2+y^2}`.replace('a', String(a))),
                s: withDisplayMath(`0`),
                tag: "Order estimate"
              };
            case 7:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{x^2y^2}{x^4+y^4}`),
                s: withDisplayMath(`\\text{Does not exist}`),
                tag: "Path dependence"
              };
            case 8:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{e^{x^2+y^2}-1}{x^2+y^2}`),
                s: withDisplayMath(`1`),
                tag: "Expansion"
              };
            case 9:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{\\ln(1+x^2+y^2)}{x^2+y^2}`),
                s: withDisplayMath(`1`),
                tag: "Expansion"
              };
            default:
              return {
                q: withDisplayMath(`\\lim_{(x,y)\\to(0,0)} \\frac{xy}{\\sqrt{x^2+y^2}}`),
                s: withDisplayMath(`0`),
                tag: "Polar coordinates"
              };

              s: withDisplayMath(`F=qvB\\sin\\theta=${q}\\times10^{-6}\\cdot${v}\\cdot${B}\\sin(${theta}^{\\circ})=${dec(q * 1e-6 * v * B * Math.sin(theta * Math.PI / 180))}\\,\\mathrm{N}`),
              tag: "Lorentz force"
            };
          },
          () => {
            const V = randInt(12, 48);
            const R = randInt(2, 12);
            return {
              q: withDisplayMath(`\\text{A resistor network has equivalent resistance }R_{eq}=${R}\\,\\Omega\\text{ and is connected to }V=${V}\\,\\mathrm{V}.\\ \\text{Find the power delivered by the source.}`),
              s: withDisplayMath(`P=\\frac{V^2}{R_{eq}}=\\frac{${V}^2}{${R}}=${dec((V * V) / R)}\\,\\mathrm{W}`),
              tag: "Power"
            };
          },
          () => {
            const N = randInt(5, 40);
            const I = randInt(1, 8);
            const R = randInt(1, 6) / 10;
            return {
              q: withDisplayMath(`\\text{A circular loop has }N=${N}\\text{ turns, radius }R=${R}\\,\\mathrm{m},\\text{ and current }I=${I}\\,\\mathrm{A}.\\ \\text{Find the magnetic field at the center.}`),
              s: withDisplayMath(`B=\\frac{\\mu_0NI}{2R}=\\frac{\\mu_0\\cdot${N}\\cdot${I}}{2\\cdot${R}}=${(mu0 * N * I / (2 * R)).toExponential(2)}\\,\\mathrm{T}`),
              tag: "Circular loop"
            };
          }
        ];
        return buildPool(() => choice(factories)(), 170);
      }

      const factories = [
        () => {
          const R1 = randInt(2, 10);
          const R2 = randInt(2, 10);
          const V = randInt(12, 36);
          return {
            q: withDisplayMath(`\\text{Two resistors }R_1=${R1}\\,\\Omega\\text{ and }R_2=${R2}\\,\\Omega\\text{ are in series on a }V=${V}\\,\\mathrm{V}\\text{ source. Find the current.}`),
            s: withDisplayMath(`I=\\frac{V}{R_1+R_2}=\\frac{${V}}{${R1 + R2}}=${dec(V / (R1 + R2))}\\,\\mathrm{A}`),
            tag: "Series circuit"
          };
        },
        () => {
          const R1 = randInt(2, 10);
          const R2 = randInt(2, 10);
          const V = randInt(12, 36);
          return {
            q: withDisplayMath(`\\text{Two resistors }R_1=${R1}\\,\\Omega\\text{ and }R_2=${R2}\\,\\Omega\\text{ are in series on a }V=${V}\\,\\mathrm{V}\\text{ source. Find the voltage across }R_1.}`),
            s: withDisplayMath(`V_1=V\\frac{R_1}{R_1+R_2}=${V}\\frac{${R1}}{${R1 + R2}}=${dec(V * R1 / (R1 + R2))}\\,\\mathrm{V}`),
            tag: "Voltage divider"
          };
        },
        () => {
          const R1 = randInt(2, 10);
          const R2 = randInt(2, 10);
          return {
            q: withDisplayMath(`\\text{Two resistors }R_1=${R1}\\,\\Omega\\text{ and }R_2=${R2}\\,\\Omega\\text{ are in parallel. Find }R_{eq}.`),
            s: withDisplayMath(`R_{eq}=\\frac{R_1R_2}{R_1+R_2}=\\frac{${R1}\\cdot${R2}}{${R1 + R2}}=${dec((R1 * R2) / (R1 + R2))}\\,\\Omega`),
            tag: "Parallel resistors"
          };
        },
        () => {
          const I = randInt(1, 8);
          const R = randInt(2, 20);
          return {
            q: withDisplayMath(`\\text{A resistor }R=${R}\\,\\Omega\\text{ carries }I=${I}\\,\\mathrm{A}.\\ \\text{Find the power dissipated.}`),
            s: withDisplayMath(`P=I^2R=${I}^2\\cdot${R}=${I * I * R}\\,\\mathrm{W}`),
            tag: "Electric power"
          };
        },
        () => {
          const I = randInt(1, 8);
          const r = randInt(1, 8) / 100;
          return {
            q: withDisplayMath(`\\text{A long straight wire carries }I=${I}\\,\\mathrm{A}.\\ \\text{Find the magnetic field at }r=${r}\\,\\mathrm{m}.}`),
            s: withDisplayMath(`B=\\frac{\\mu_0I}{2\\pi r}=\\frac{\\mu_0\\cdot${I}}{2\\pi\\cdot${r}}=${(mu0 * I / (2 * Math.PI * r)).toExponential(2)}\\,\\mathrm{T}`),
            tag: "Straight wire"
          };
        },
        () => {
          const m = choice([9.11e-31, 1.67e-27]);
          const q = choice([1.6e-19, 3.2e-19]);
          const v = randInt(1, 6) * 1e5;
          const B = randInt(1, 8) / 10;
          return {
            q: withDisplayMath(`\\text{A charged particle moves perpendicular to }B=${B}\\,\\mathrm{T}\\text{ with speed }v=${v}\\,\\mathrm{m/s}.\\ \\text{Given }m=${m.toExponential(2)}\\,\\mathrm{kg},\\ q=${q.toExponential(2)}\\,\\mathrm{C},\\ \\text{find the radius of the circular trajectory.}`),
            s: withDisplayMath(`r=\\frac{mv}{qB}=\\frac{${m.toExponential(2)}\\cdot${v}}{${q.toExponential(2)}\\cdot${B}}=${(m * v / (q * B)).toExponential(2)}\\,\\mathrm{m}`),
            tag: "Charged particle in B"
          };
        },
        () => ({
          q: withDisplayMath(`\\text{Write the magnetic field at the center of a circular loop of radius }R\\text{ carrying current }I.`),
          s: withDisplayMath(`B=\\frac{\\mu_0I}{2R}`),
          tag: "Circular loop"
        }),
        () => {
          const P = randInt(20, 200);
          const V = randInt(10, 50);
          return {
            q: withDisplayMath(`\\text{A device consumes }P=${P}\\,\\mathrm{W}\\text{ at voltage }V=${V}\\,\\mathrm{V}.\\ \\text{Find the current.}`),
            s: withDisplayMath(`I=\\frac{P}{V}=\\frac{${P}}{${V}}=${dec(P / V)}\\,\\mathrm{A}`),
            tag: "Electric power"
          };
        }
      ];
      return buildPool(() => choice(factories)(), 160);
    }

    function inductionTemplates(level = "medium") {
      if (level === "easy") {
        const factories = [
          () => ({
            q: withDisplayMath(`\\text{State Faraday's law of induction.}`),
            s: withDisplayMath(`\\mathcal{E}=-\\frac{d\\Phi_B}{dt}`),
            tag: "Faraday law"
          }),
          () => {
            const N = randInt(20, 200);
            const dphi = randInt(1, 9) / 100;
            const dt = randInt(1, 5) / 10;
            return {
              q: withDisplayMath(`\\text{A coil with }N=${N}\\text{ turns undergoes a flux change }\\Delta\\Phi=${dphi}\\,\\mathrm{Wb}\\text{ in }\\Delta t=${dt}\\,\\mathrm{s}.\\ \\text{Find the average induced emf magnitude.}`),
              s: withDisplayMath(`|\\mathcal{E}|=N\\frac{\\Delta\\Phi}{\\Delta t}=${N}\\frac{${dphi}}{${dt}}=${dec(N * dphi / dt)}\\,\\mathrm{V}`),
              tag: "Induced emf"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{State Lenz's law.}`),
            s: withDisplayMath(`\\text{The induced current opposes the change in magnetic flux that produced it.}`),
            tag: "Lenz law"
          }),
          () => {
            const f = randInt(1, 9) * 1e6;
            return {
              q: withDisplayMath(`\\text{An electromagnetic wave has frequency }f=${f}\\,\\mathrm{Hz}.\\ \\text{Find the wavelength in vacuum.}`),
              s: withDisplayMath(`\\lambda=\\frac{c}{f}=\\frac{3.0\\times10^8}{${f}}=${dec(3e8 / f, 6)}\\,\\mathrm{m}`),
              tag: "EM waves"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{In a plane electromagnetic wave in vacuum, what is the relation between the field amplitudes }E\\text{ and }B\\text{?}`),
            s: withDisplayMath(`E=cB`),
            tag: "EM waves"
          }),
          () => ({
            q: withDisplayMath(`\\text{Write the electric-field energy density in vacuum.}`),
            s: withDisplayMath(`u_E=\\frac12\\varepsilon_0E^2`),
            tag: "Field energy"
          }),
          () => ({
            q: withDisplayMath(`\\text{Write the magnetic-field energy density in vacuum.}`),
            s: withDisplayMath(`u_B=\\frac{B^2}{2\\mu_0}`),
            tag: "Field energy"
          }),
          () => ({
            q: withDisplayMath(`\\text{Write the ideal-transformer voltage relation.}`),
            s: withDisplayMath(`\\frac{V_2}{V_1}=\\frac{N_2}{N_1}`),
            tag: "Transformer"
          })
        ];
        return buildPool(() => choice(factories)(), 150);
      }

      if (level === "hard") {
        const factories = [
          () => ({
            q: withDisplayMath(`\\text{State the integral form of the Ampere-Maxwell law.}`),
            s: withDisplayMath(`\\oint \\vec B\\cdot d\\vec l=\\mu_0I_{enc}+\\mu_0\\varepsilon_0\\frac{d\\Phi_E}{dt}`),
            tag: "Maxwell equations"
          }),
          () => ({
            q: withDisplayMath(`\\text{Write the displacement current in terms of the electric-flux change.}`),
            s: withDisplayMath(`I_d=\\varepsilon_0\\frac{d\\Phi_E}{dt}`),
            tag: "Displacement current"
          }),
          () => {
            const L = randInt(1, 8) / 10;
            const R = randInt(1, 20);
            return {
              q: withDisplayMath(`\\text{An RL circuit has }L=${L}\\,\\mathrm{H}\\text{ and }R=${R}\\,\\Omega.\\ \\text{Find the time constant.}`),
              s: withDisplayMath(`\\tau=\\frac{L}{R}=\\frac{${L}}{${R}}=${dec(L / R, 4)}\\,\\mathrm{s}`),
              tag: "RL circuit"
            };
          },
          () => {
            const N = randInt(20, 200);
            const B = randInt(1, 8) / 10;
            const A = randInt(1, 8) / 100;
            const omega = randInt(20, 120);
            return {
              q: withDisplayMath(`\\text{A loop with }N=${N}\\text{ turns and area }A=${A}\\,\\mathrm{m^2}\\text{ rotates in }B=${B}\\,\\mathrm{T}\\text{ with angular speed }\\omega=${omega}\\,\\mathrm{rad/s}.\\ \\text{Find the maximum induced emf.}`),
              s: withDisplayMath(`\\mathcal{E}_{max}=NBA\\omega=${N}\\cdot${B}\\cdot${A}\\cdot${omega}=${dec(N * B * A * omega)}\\,\\mathrm{V}`),
              tag: "Rotating loop"
            };
          },
          () => {
            const L = randInt(1, 8) / 1000;
            const C = randInt(1, 8) / 1000000;
            return {
              q: withDisplayMath(`\\text{An LC circuit has }L=${L}\\,\\mathrm{H}\\text{ and }C=${C}\\,\\mathrm{F}.\\ \\text{Find the resonant frequency.}`),
              s: withDisplayMath(`f=\\frac{1}{2\\pi\\sqrt{LC}}=\\frac{1}{2\\pi\\sqrt{${L}\\cdot${C}}}=${dec(1 / (2 * Math.PI * Math.sqrt(L * C)), 2)}\\,\\mathrm{Hz}`),
              tag: "LC circuit"
            };
          },
          () => ({
            q: withDisplayMath(`\\text{Write the ideal-transformer power relation.}`),
            s: withDisplayMath(`V_1I_1=V_2I_2`),
            tag: "Transformer"
          }),
          () => {
            const f = randInt(1, 9) * 1e8;
            return {
              q: withDisplayMath(`\\text{A radio wave has frequency }f=${f}\\,\\mathrm{Hz}.\\ \\text{Find the wavelength in vacuum.}`),
              s: withDisplayMath(`\\lambda=\\frac{c}{f}=\\frac{3.0\\times10^8}{${f}}=${dec(3e8 / f, 6)}\\,\\mathrm{m}`),
              tag: "EM waves"
            };
          },
          () => {
            const N = randInt(20, 150);
            const dphi = randInt(1, 9) / 100;
            const R = randInt(1, 10);
            return {
              q: withDisplayMath(`\\text{A coil with }N=${N}\\text{ turns and resistance }R=${R}\\,\\Omega\\text{ experiences a total flux change }\\Delta\\Phi=${dphi}\\,\\mathrm{Wb}.\\ \\text{Find the total induced charge.}`),
              s: withDisplayMath(`Q=\\frac{N\\Delta\\Phi}{R}=\\frac{${N}\\cdot${dphi}}{${R}}=${dec((N * dphi) / R)}\\,\\mathrm{C}`),
              tag: "Induced charge"
            };
          }
        ];
        return buildPool(() => choice(factories)(), 170);
      }

      const factories = [
        () => {
          const N = randInt(20, 200);
          const A = randInt(1, 8) / 100;
          const dB = randInt(1, 8) / 10;
          const dt = randInt(1, 5) / 10;
          return {
            q: withDisplayMath(`\\text{A coil with }N=${N}\\text{ turns and area }A=${A}\\,\\mathrm{m^2}\\text{ experiences a field change }\\Delta B=${dB}\\,\\mathrm{T}\\text{ in }\\Delta t=${dt}\\,\\mathrm{s}.\\ \\text{Find the average induced emf.}`),
            s: withDisplayMath(`|\\mathcal{E}|=N\\frac{A\\Delta B}{\\Delta t}=${N}\\frac{${A}\\cdot${dB}}{${dt}}=${dec(N * A * dB / dt)}\\,\\mathrm{V}`),
            tag: "Faraday law"
          };
        },
        () => {
          const emf = randInt(5, 40);
          const R = randInt(1, 10);
          return {
            q: withDisplayMath(`\\text{A loop has induced emf }\\mathcal{E}=${emf}\\,\\mathrm{V}\\text{ and resistance }R=${R}\\,\\Omega.\\ \\text{Find the induced current magnitude.}`),
            s: withDisplayMath(`I=\\frac{\\mathcal{E}}{R}=\\frac{${emf}}{${R}}=${dec(emf / R)}\\,\\mathrm{A}`),
            tag: "Induced current"
          };
        },
        () => {
          const B = randInt(1, 8) / 10;
          const l = randInt(1, 8) / 10;
          const v = randInt(1, 8);
          return {
            q: withDisplayMath(`\\text{A rod of length }l=${l}\\,\\mathrm{m}\\text{ moves at }v=${v}\\,\\mathrm{m/s}\\text{ perpendicular to }B=${B}\\,\\mathrm{T}.\\ \\text{Find the motional emf.}`),
            s: withDisplayMath(`\\mathcal{E}=Blv=${B}\\cdot${l}\\cdot${v}=${dec(B * l * v)}\\,\\mathrm{V}`),
            tag: "Motional emf"
          };
        },
        () => ({
          q: withDisplayMath(`\\text{Write the self-inductance relation between flux linkage and current.}`),
          s: withDisplayMath(`N\\Phi_B=LI`),
          tag: "Inductance"
        }),
        () => {
          const L = randInt(1, 8) / 10;
          const I = randInt(1, 8);
          return {
            q: withDisplayMath(`\\text{An inductor has }L=${L}\\,\\mathrm{H}\\text{ and current }I=${I}\\,\\mathrm{A}.\\ \\text{Find the magnetic energy stored.}`),
            s: withDisplayMath(`U=\\frac12 LI^2=\\frac12\\cdot${L}\\cdot${I}^2=${dec(0.5 * L * I * I)}\\,\\mathrm{J}`),
            tag: "Inductor energy"
          };
        },
        () => {
          const N1 = randInt(50, 300);
          const N2 = randInt(50, 300);
          const V1 = randInt(12, 120);
          return {
            q: withDisplayMath(`\\text{An ideal transformer has }N_1=${N1},\\ N_2=${N2}\\text{ and primary voltage }V_1=${V1}\\,\\mathrm{V}.\\ \\text{Find the secondary voltage.}`),
            s: withDisplayMath(`V_2=V_1\\frac{N_2}{N_1}=${V1}\\frac{${N2}}{${N1}}=${dec(V1 * N2 / N1)}\\,\\mathrm{V}`),
            tag: "Transformer"
          };
        },
        () => ({
          q: withDisplayMath(`\\text{Write the resonant frequency of an LC circuit.}`),
          s: withDisplayMath(`f=\\frac{1}{2\\pi\\sqrt{LC}}`),
          tag: "LC circuit"
        }),
        () => ({
          q: withDisplayMath(`\\text{What is the Poynting vector in vacuum?}`),
          s: withDisplayMath(`\\vec S=\\frac{1}{\\mu_0}\\vec E\\times\\vec B`),
          tag: "Poynting vector"
        })
      ];
      return buildPool(() => choice(factories)(), 160);
    }

    function generatorForTopic(topic, level) {
      switch (topic) {
        case "multivariable-limits": return multivariableLimitTemplates(level);
        case "multiple-integrals": return multipleIntegralTemplates(level);
        case "directional-derivatives": return directionalDerivativeTemplates(level);
        case "differentiability": return differentiabilityTemplates(level);
        default: return [];
      }
    }

    function buildExercises(topic, count, level) {
      const pool = generatorForTopic(topic, level);
      return sampleExercises(pool, count);
    }

    function buildExamSheet(level) {
      const topics = [
        "multivariable-limits",
        "multiple-integrals",
        "directional-derivatives",
        "differentiability"
      ];
      const chosen = topics.map((topic, i) => {
        const pool = generatorForTopic(topic, level);
        const ex = choice(pool);
        return { index: i + 1, ...ex, examTopic: topic };
      });
      return shuffle(chosen).map((ex, index) => ({ ...ex, index: index + 1 }));
    }

    let currentTopic = "multivariable-limits";
    let solutionsVisible = false;
    let currentExercises = [];

    function labelForTopic(topic) {
      switch (topic) {
        case "multivariable-limits": return "Multivariable Limits";
        case "multiple-integrals": return "Multiple Integrals";
        case "directional-derivatives": return "Directional Derivatives";
        case "differentiability": return "Differentiability";
        case "exam": return "Exam Mode";
        default: return "Worksheet";
      }
    }

    function defaultTitleForTopic(topic) {
      switch (topic) {
        case "multivariable-limits": return "Multivariable Limits Worksheet";
        case "multiple-integrals": return "Multiple Integrals Worksheet";
        case "directional-derivatives": return "Directional Derivatives Worksheet";
        case "differentiability": return "Differentiability Worksheet";
        case "exam": return "Calculus II Exam Practice";
        default: return "Calculus II Worksheet";
      }
    }

    function updateTopicButtons() {
      document.querySelectorAll("#topicNav button").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.topic === currentTopic);
      });
    }

    function updatePills() {
      const level = document.getElementById("level").value;
      document.getElementById("levelPill").textContent = level.toUpperCase();
      document.getElementById("solutionsPill").textContent = solutionsVisible ? "VISIBLE" : "HIDDEN";
    }

    async function typesetMath(elements) {
      if (window.MathJax && window.MathJax.typesetPromise) {
        await window.MathJax.typesetPromise(elements);
      }
    }

    async function renderLists() {
      const exerciseList = document.getElementById("exerciseList");
      const solutionList = document.getElementById("solutionList");
      const solutionsCard = document.getElementById("solutionsCard");

      exerciseList.innerHTML = "";
      solutionList.innerHTML = "";

      currentExercises.forEach((ex) => {
        const tag = ex.examTopic ? labelForTopic(ex.examTopic).toUpperCase() : ex.tag;

        const exEl = document.createElement("div");
        exEl.className = "exercise";
        exEl.innerHTML = `
          <div class="exercise-head">
            <div class="exercise-number">Exercise ${ex.index}</div>
            <div class="tag">${tag}</div>
          </div>
          <div class="math">${ex.q}</div>
        `;
        exerciseList.appendChild(exEl);

        const solEl = document.createElement("div");
        solEl.className = "exercise";
        solEl.innerHTML = `
          <div class="exercise-head">
            <div class="exercise-number">Solution ${ex.index}</div>
            <div class="tag">${tag}</div>
          </div>
          <div class="math">${ex.s}</div>
        `;
        solutionList.appendChild(solEl);
      });

      solutionsCard.classList.toggle("hidden", !solutionsVisible);
      updatePills();
      await typesetMath([exerciseList, solutionList]);
    }

    async function generateWorksheet() {
      const titleInput = document.getElementById("title");
      const countInput = document.getElementById("count");
      const levelSelect = document.getElementById("level");
      const previewTitle = document.getElementById("previewTitle");
      const status = document.getElementById("status");

      const count = Math.max(1, Math.min(50, Number(countInput.value) || 10));
      countInput.value = count;

      const level = levelSelect.value;
      const title = titleInput.value.trim() || defaultTitleForTopic(currentTopic);
      previewTitle.textContent = title;

      currentExercises = currentTopic === "exam"
        ? buildExamSheet(level)
        : buildExercises(currentTopic, count, level);

      await renderLists();

      status.textContent = currentTopic === "exam"
        ? `Generated ${currentExercises.length} exam exercises.`
        : `Generated ${currentExercises.length} exercises.`;
    }

    async function setTopic(topic) {
      currentTopic = topic;
      const titleInput = document.getElementById("title");
      const countWrap = document.getElementById("countWrap");
      const status = document.getElementById("status");

      titleInput.value = defaultTitleForTopic(topic);
      countWrap.classList.toggle("hidden", topic === "exam");
      updateTopicButtons();
      solutionsVisible = false;
      document.getElementById("toggleSolutionsBtn").textContent = "Show solutions";
      status.textContent = "Ready.";

      await generateWorksheet();
    }

    function buildPdfMarkup() {
      const title = document.getElementById("previewTitle").textContent || "Worksheet";
      const level = document.getElementById("level").value.toUpperCase();
      const pdfLevel = withDisplayMath(`\\text{Difficulty: } ${latexText(level)}`);
      const pdfExercises = withDisplayMath(`\\text{Exercises}`);
      const pdfSolutions = withDisplayMath(`\\text{Solutions}`);

      const exerciseHtml = currentExercises.map((ex) => {
        const tag = ex.examTopic ? labelForTopic(ex.examTopic).toUpperCase() : ex.tag;
        return `
          <div class="pdf-exercise">
            <div class="pdf-head">
              <div class="pdf-num">Exercise ${ex.index}</div>
              <div class="pdf-tag">${tag}</div>
            </div>
            <div class="pdf-math">${ex.q}</div>
          </div>
        `;
      }).join("");

      const solutionHtml = currentExercises.map((ex) => {
        const tag = ex.examTopic ? labelForTopic(ex.examTopic).toUpperCase() : ex.tag;
        return `
          <div class="pdf-exercise">
            <div class="pdf-head">
              <div class="pdf-num">Solution ${ex.index}</div>
              <div class="pdf-tag">${tag}</div>
            </div>
            <div class="pdf-math">${ex.s}</div>
          </div>
        `;
      }).join("");

      return `
        <div class="pdf-page">
          <div class="pdf-title">${title}</div>
          <div class="pdf-meta">${pdfLevel}</div>
          <div class="pdf-section-title">${pdfExercises}</div>
          ${exerciseHtml}
        </div>
        ${solutionsVisible ? `
        <div class="pdf-page">
          <div class="pdf-title">${title}</div>
          <div class="pdf-meta">${pdfSolutions}</div>
          <div class="pdf-section-title">${pdfSolutions}</div>
          ${solutionHtml}
        </div>` : ""}
      `;
    }

    async function downloadPdf() {
      const status = document.getElementById("status");
      const title = document.getElementById("previewTitle").textContent || "worksheet";

      try {
        if (!window.LatexPdfExport || !window.LatexPdfExport.exportWorksheet) {
          throw new Error("LaTeX PDF export helper not loaded.");
        }

        status.textContent = "Compiling LaTeX PDF...";

        const exercises = currentExercises.map((ex, index) => {
          const tag = ex.examTopic
            ? (typeof labelForTopic === "function"
                ? labelForTopic(ex.examTopic)
                : window.LatexPdfExport.humanizeSlug(ex.examTopic))
            : ex.tag;

          return {
            index: ex.index ?? index + 1,
            tag,
            q: ex.q,
            s: ex.s
          };
        });

        await window.LatexPdfExport.exportWorksheet({
          title,
          subject: document.title || "Worksheet",
          difficulty: document.getElementById("level").value.toUpperCase(),
          includeSolutions: solutionsVisible,
          exercises
        });

        status.textContent = "LaTeX PDF downloaded successfully.";
      } catch (err) {
        status.textContent = err?.message || "LaTeX PDF generation failed.";
        console.error(err);
      }
    }

    document.getElementById("generateBtn").addEventListener("click", generateWorksheet);

    document.getElementById("toggleSolutionsBtn").addEventListener("click", async () => {
      solutionsVisible = !solutionsVisible;
      document.getElementById("toggleSolutionsBtn").textContent = solutionsVisible ? "Hide solutions" : "Show solutions";
      await renderLists();
    });

    document.getElementById("downloadBtn").addEventListener("click", downloadPdf);
    document.getElementById("level").addEventListener("change", async () => {
      updatePills();
      await generateWorksheet();
    });

    document.querySelectorAll("#topicNav button").forEach((btn) => {
      btn.addEventListener("click", () => setTopic(btn.dataset.topic));
    });

    setTopic("multivariable-limits");
  </script>
</body>
</html>

  <style>
    :root {
      --bg-1: #08101d;

    .hero h1 {

    }

    .hero p {
      margin: 0;
      color: var(--muted);

    .topic-nav {

    .topic-nav button {

      gap: 24px;

    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);

    .settings-card { position: sticky; top: 18px; }

    .card h2 { margin: 0 0 6px; font-size: 1.2rem; }

    .subtle, .status {
      color: var(--muted);

    label {

    input, select, button {

    input:focus, select:focus {

    }

    button { cursor: pointer; font-weight: 800; transition: 0.2s ease; }
    button:hover { transform: translateY(-1px); }

    .primary {

    .exercise {

    .exercise-head {

      gap: 10px;

    }

    .exercise-number {

    }

    .math { font-size: 1.08rem; line-height: 1.75; overflow-wrap: anywhere; }
    .solutions-card.hidden, .hidden { display: none !important; }

    .footer-copy {
      margin-top: 28px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.95rem;
    }

    #pdfArea {
      position: absolute;
      left: -99999px;
      top: 0;
      width: 794px;
      background: white;
      color: black;
      padding: 40px;
    }

    .pdf-page {
      width: 100%;
      min-height: 1040px;
      padding: 10px 0 30px;
      background: white;
      color: black;
      page-break-after: always;
    }

    .pdf-page:last-child { page-break-after: auto; }
    .pdf-title { font-size: 28px; font-weight: 700; margin-bottom: 6px; color: black; }
    .pdf-meta { font-size: 14px; color: #333; margin-bottom: 22px; }
    .pdf-section-title { font-size: 20px; font-weight: 700; margin: 10px 0 18px; color: black; }

    .pdf-head {
      display: flex;
      justify-content: space-between;

      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .pdf-tag {
      display: inline-block;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef7f4;
      border: 1px solid #cbe9df;
      color: #165c4f;
      font-weight: 700;
    }

    .pdf-num { color: #444; font-weight: 700; font-size: 13px; }
    .pdf-math { color: black; font-size: 16px; line-height: 1.6; }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .hero-badge { width: 72px; height: 72px; font-size: 28px; }
      .grid { grid-template-columns: 1fr; }
      .settings-card { position: static; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-badge">A</div>
      <div>
        <h1>Geometry and Linear Algebra Generator</h1>
        <p>
          Generate university-style worksheets inspired by first-year Geometry and Linear Algebra courses:
          linear systems, matrices and determinants, vector spaces and linear maps, eigenvalues and diagonalization,
          orthogonality and quadratic forms, plus mixed exam-mode practice. All exercises and solutions are rendered in LaTeX.
        </p>
      </div>
    </section>

    <div class="topic-nav" id="topicNav">
      <button data-topic="systems" class="active">Linear Systems</button>
      <button data-topic="matrices">Matrices & Determinants</button>
      <button data-topic="vector-spaces">Vector Spaces & Linear Maps</button>
      <button data-topic="eigen">Eigenvalues & Diagonalization</button>
      <button data-topic="orthogonality">Orthogonality & Quadratic Forms</button>
      <button data-topic="exam">Exam Mode</button>
    </div>

    <div class="grid">
      <div class="card settings-card stack">
        <div>
          <h2>Settings</h2>
          <div class="subtle">Choose a topic, difficulty, and generate a fresh GAL-style worksheet instantly.</div>
        </div>

        <div>
          <label for="title">Worksheet title</label>
          <input id="title" value="Geometry and Linear Algebra Worksheet" />
        </div>

        <div id="countWrap">
          <label for="count">Number of exercises</label>
          <input id="count" type="number" min="1" max="50" value="10" />
        </div>

        <div>
          <label for="level">Difficulty</label>
          <select id="level">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>

        <button class="primary" id="generateBtn">Generate worksheet</button>
        <button class="secondary" id="toggleSolutionsBtn">Show solutions</button>
        <button class="secondary" id="downloadBtn">Download LaTeX PDF</button>

        <div class="status" id="status">Ready.</div>
      </div>

      <div>
        <div class="card">
          <div class="preview-title-row">
            <h2 id="previewTitle" style="margin:0;">Geometry and Linear Algebra Worksheet</h2>
            <div class="level-pill" id="levelPill">MEDIUM</div>
          </div>
          <div id="exerciseList"></div>
        </div>

        <div class="card solutions-card hidden" id="solutionsCard" style="margin-top:24px;">
          <div class="preview-title-row">
            <h2 style="margin:0;">Solutions</h2>
            <div class="level-pill" id="solutionsPill">HIDDEN</div>
          </div>
          <div id="solutionList"></div>
        </div>
      </div>
    </div>

    <div class="footer-copy">
      In Exam Mode, the generator creates one exercise for each macro-topic:
      systems, determinants, vector spaces/linear maps, eigenvalues, and orthogonality/quadratic forms.
    </div>
  </div>

  <div id="pdfArea"></div>

  <script>
    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    const choice = (arr) => {
      if (!Array.isArray(arr) || arr.length === 0) throw new Error("Cannot choose from an empty array.");
      return arr[Math.floor(Math.random() * arr.length)];
    };

    function gcd(a, b) {
      a = Math.abs(a); b = Math.abs(b);
      while (b !== 0) { const t = b; b = a % b; a = t; }
      return a;
    }

    function frac(n, d) {
      if (d === 0) throw new Error("Denominator cannot be zero.");
      const sign = d < 0 ? -1 : 1;
      n *= sign; d *= sign;
      const g = gcd(n, d);
      return `\\frac{${n / g}}{${d / g}}`;
    }

    function withDisplayMath(latex) { return `\\[${latex}\\]`; }

    function latexText(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/%/g, "\\%")
        .replace(/_/g, "\\_")
        .replace(/&/g, "\\&")
        .replace(/#/g, "\\#");
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function sampleExercises(pool, count) {
      if (!Array.isArray(pool) || pool.length === 0) return [];
      const out = [];
      while (out.length < count) {
        const round = shuffle(pool);
        for (const ex of round) {
          out.push(ex);
          if (out.length >= count) break;
        }
      }
      return out.slice(0, count).map((ex, index) => ({
        index: index + 1,
        q: ex.q,
        s: ex.s,
        tag: ex.tag,
        examTopic: ex.examTopic
      }));
    }

    function buildPool(factory, size = 140) {
      const seen = new Set();
      const out = [];
      let attempts = 0;
      while (out.length < size && attempts < size * 50) {
        attempts += 1;
        const ex = factory();
        const key = `${ex.q}=>${ex.s}`;
        if (seen.has(key)) continue;
        seen.add(key);
        out.push(ex);
      }
      return shuffle(out);
    }

    function systemsTemplates(level = "medium") {
      if (level === "easy") {
        return buildPool(() => {
          const a = randInt(1,4), b = randInt(1,4), c = randInt(1,4);
          const x0 = randInt(-2,3), y0 = randInt(-2,3), z0 = randInt(-2,3);
          const eq1 = a*x0 + y0;
          const eq2 = x0 + b*y0;
          const type = randInt(1,7);
          switch (type) {
            case 1:
              return {
                q: withDisplayMath(`\\text{Solve }\\begin{cases}${a}x+y=${eq1}\\\\x+${b}y=${eq2}\\end{cases}`),
                s: withDisplayMath(`(x,y)=(${x0},${y0})`),
                tag: "2x2 system"
              };
            case 2:
              return {
                q: withDisplayMath(`\\text{Solve }\\begin{cases}x+y+z=${x0+y0+z0}\\\\x-y+z=${x0-y0+z0}\\\\2x+z=${2*x0+z0}\\end{cases}`),
                s: withDisplayMath(`(x,y,z)=(${x0},${y0},${z0})`),
                tag: "3x3 system"
              };
            case 3:
              return {
                q: withDisplayMath(`\\text{Find the rank of }A=\\begin{pmatrix}1&2&3\\\\2&4&6\\\\1&0&1\\end{pmatrix}`),
                s: withDisplayMath(`\\operatorname{rank}(A)=2`),
                tag: "Rank"
              };
            case 4:
              return {
                q: withDisplayMath(`\\text{Discuss the system }\\begin{cases}x+y=1\\\\2x+2y=2\\end{cases}`),
                s: withDisplayMath(`\\text{Infinitely many solutions: }x=1-t,\\ y=t`),
                tag: "Compatibility"
              };
            case 5:
              return {
                q: withDisplayMath(`\\text{Discuss the system }\\begin{cases}x+y=1\\\\2x+2y=3\\end{cases}`),
                s: withDisplayMath(`\\text{No solution}`),
                tag: "Incompatible system"
              };
            case 6:
              return {
                q: withDisplayMath(`\\text{Solve }\\begin{cases}x+2y-z=1\\\\2x-y+z=0\\\\x+y+z=2\\end{cases}`),
                s: withDisplayMath(`(x,y,z)=\\left(\\frac{1}{3},\\frac{2}{3},1\\right)`),
                tag: "Gaussian elimination"
              };
            default:
              return {
                q: withDisplayMath(`\\text{Find }\\dim\\ker A\\text{ for }A=\\begin{pmatrix}1&0&1\\\\0&1&1\\end{pmatrix}`),
                s: withDisplayMath(`\\dim\\ker A=1`),
                tag: "Kernel dimension"
              };
          }
        }, 120);
      }

      if (level === "hard") {
        return buildPool(() => {
          const type = randInt(1,10);
          switch (type) {
            case 1:
              return {
                q: withDisplayMath(`\\text{For which }\\lambda\\in\\mathbb{R}\\text{ does }\\begin{cases}x+y+z=1\\\\x+2y+3z=\\lambda\\\\2x+3y+4z=\\lambda+1\\end{cases}\\text{ have solutions?}`),
                s: withDisplayMath(`\\text{The system is compatible for every }\\lambda,\\text{ with a unique solution.}`),
                tag: "Parameter study"
              };
            case 2:
              return {
                q: withDisplayMath(`\\text{For which }k\\text{ is }\\begin{cases}x+y+z=1\\\\x+2y+3z=2\\\\2x+3y+(k+2)z=3\\end{cases}\\text{ compatible?}`),
                s: withDisplayMath(`\\det A = k-1.\\ \\text{Unique solution if }k\\neq 1;\\ \\text{if }k=1\\text{ the system is compatible with infinitely many solutions.}`),
                tag: "Rouche-Capelli"
              };
            case 3:
              return {
                q: withDisplayMath(`\\text{Compute a basis of }\\ker A\\text{ for }A=\\begin{pmatrix}1&2&1&0\\\\0&1&1&1\\\\1&3&2&1\\end{pmatrix}`),
                s: withDisplayMath(`\\ker A=\\operatorname{span}\\{(-1,-1,1,0),(2,-1,0,1)\\}`),
                tag: "Kernel basis"
              };
            case 4:
              return {
                q: withDisplayMath(`\\text{Solve }AX=b\\text{ with }A=\\begin{pmatrix}1&1&1\\\\1&2&3\\\\1&3&6\\end{pmatrix},\\ b=\\begin{pmatrix}1\\\\2\\\\3\\end{pmatrix}`),
                s: withDisplayMath(`X=\\begin{pmatrix}1\\\\0\\\\0\\end{pmatrix}`),
                tag: "Triangular elimination"
              };
            case 5:
              return {
                q: withDisplayMath(`\\text{Find the rank of }A=\\begin{pmatrix}1&2&3&4\\\\2&4&6&8\\\\1&1&1&1\\\\0&1&2&3\\end{pmatrix}`),
                s: withDisplayMath(`\\operatorname{rank}(A)=2`),
                tag: "Rank"
              };
            case 6:
              return {
                q: withDisplayMath(`\\text{Discuss the dimension of the solution set of }\\begin{cases}x+y+z+t=0\\\\x+2y+3z+4t=0\\end{cases}`),
                s: withDisplayMath(`\\dim\\mathcal{S}=2`),
                tag: "Homogeneous system"
              };
            case 7:
              return {
                q: withDisplayMath(`\\text{Find a basis of the row space of }A=\\begin{pmatrix}1&2&1\\\\0&1&1\\\\1&3&2\\end{pmatrix}`),
                s: withDisplayMath(`\\text{A basis is }\\{(1,2,1),(0,1,1)\\}`),
                tag: "Row space"
              };
            case 8:
              return {
                q: withDisplayMath(`\\text{Compute }\\dim\\operatorname{Im}A\\text{ and }\\dim\\ker A\\text{ for }A:\\mathbb{R}^4\\to\\mathbb{R}^3,\\ A=\\begin{pmatrix}1&0&1&2\\\\0&1&1&1\\\\1&1&2&3\\end{pmatrix}`),
                s: withDisplayMath(`\\operatorname{rank}(A)=2,\\quad \\dim\\ker A=2`),
                tag: "Rank-nullity"
              };
            case 9:
              return {
                q: withDisplayMath(`\\text{Reduce }A=\\begin{pmatrix}1&2&1\\\\2&4&2\\\\1&1&0\\end{pmatrix}\\text{ to row echelon form.}`),
                s: withDisplayMath(`\\begin{pmatrix}1&2&1\\\\0&1&1\\\\0&0&0\\end{pmatrix}`),
                tag: "Row reduction"
              };
            default:
              return {
                q: withDisplayMath(`\\text{Give all solutions of }\\begin{cases}x+y+z=0\\\\2x+2y+2z=0\\\\x-z=1\\end{cases}`),
                s: withDisplayMath(`(x,y,z)=(1-t,t,-t),\\quad t\\in\\mathbb{R}`),
                tag: "Parametric solution"
              };
          }
        }, 140);
      }

      return buildPool(() => {
        const type = randInt(1,10);
        switch (type) {
          case 1:
            return {
              q: withDisplayMath(`\\text{Solve }\\begin{cases}x+y=3\\\\2x-y=0\\end{cases}`),
              s: withDisplayMath(`(x,y)=(1,2)`),
              tag: "2x2 system"
            };
          case 2:
            return {
              q: withDisplayMath(`\\text{Discuss }\\begin{cases}x+y+z=1\\\\2x+2y+2z=2\\\\x-y=0\\end{cases}`),
              s: withDisplayMath(`\\text{Infinitely many solutions: }(x,y,z)=(t,t,1-2t)`),
              tag: "Compatibility"
            };
          case 3:
            return {
              q: withDisplayMath(`\\text{Compute }\\operatorname{rank}\\begin{pmatrix}1&2&3\\\\2&4&6\\\\1&1&1\\end{pmatrix}`),
              s: withDisplayMath(`2`),
              tag: "Rank"
            };
          case 4:
            return {
              q: withDisplayMath(`\\text{Find a basis of }\\ker\\begin{pmatrix}1&1&0\\\\0&1&1\\end{pmatrix}`),
              s: withDisplayMath(`\\ker A=\\operatorname{span}\\{(1,-1,1)\\}`),
              tag: "Kernel"
            };
          case 5:
            return {
              q: withDisplayMath(`\\text{Solve }\\begin{cases}x+2y-z=1\\\\2x-y+z=0\\\\x+y+z=2\\end{cases}`),
              s: withDisplayMath(`(x,y,z)=\\left(\\frac{1}{3},\\frac{2}{3},1\\right)`),
              tag: "Gaussian elimination"
            };
          case 6:
            return {
              q: withDisplayMath(`\\text{Determine }\\dim\\mathcal{S}\\text{ for }\\begin{cases}x+y+z+t=0\\\\x+2y+3z+4t=0\\end{cases}`),
              s: withDisplayMath(`2`),
              tag: "Homogeneous system"
            };
          case 7:
            return {
              q: withDisplayMath(`\\text{Compute }\\dim\\ker A\\text{ for }A=\\begin{pmatrix}1&0&1&2\\\\0&1&1&1\\\\1&1&2&3\\end{pmatrix}`),
              s: withDisplayMath(`2`),
              tag: "Rank-nullity"
            };
          case 8:
            return {
              q: withDisplayMath(`\\text{Is }\\begin{cases}x+y=1\\\\2x+2y=3\\end{cases}\\text{ compatible?}`),
              s: withDisplayMath(`\\text{No}`),
              tag: "Incompatible system"
            };
          case 9:
            return {
              q: withDisplayMath(`\\text{Find a basis of }\\operatorname{Im}A\\text{ for }A=\\begin{pmatrix}1&0&1\\\\0&1&1\\\\1&1&2\\end{pmatrix}`),
              s: withDisplayMath(`\\operatorname{Im}A=\\operatorname{span}\\{(1,0,1),(0,1,1)\\}`),
              tag: "Image"
            };
          default:
            return {
              q: withDisplayMath(`\\text{Give all solutions of }x+y+z=0`),
              s: withDisplayMath(`(x,y,z)=(-s-t,s,t),\\quad s,t\\in\\mathbb{R}`),
              tag: "Parametric form"
            };
          }
      }, 130);
    }

    function matricesTemplates(level = "medium") {
      if (level === "easy") {
        return buildPool(() => {
          const a = randInt(1,5), b = randInt(1,4), c = randInt(1,4);
          const det = a*c - b;
          const type = randInt(1,8);
          switch (type) {
            case 1:
              return {
                q: withDisplayMath(`\\det\\begin{pmatrix}${a}&1\\\\${b}&${c}\\end{pmatrix}`),
                s: withDisplayMath(`${det}`),
                tag: "2x2 determinant"
              };
            case 2:
              return {
                q: withDisplayMath(`\\det\\begin{pmatrix}1&2&0\\\\0&1&3\\\\0&0&2\\end{pmatrix}`),
                s: withDisplayMath(`2`),
                tag: "Triangular determinant"
              };
            case 3:
